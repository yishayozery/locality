<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOCALITY | המערכת הלוגיסטית המלאה v56.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@200;400;600;700;800&display=swap');
        body { font-family: 'Assistant', sans-serif; background: #f8fafc; color: #1e1b4b; min-height: 100vh; overflow-x: hidden; }
        .glass-card { background: white; border-radius: 3rem; box-shadow: 0 40px 100px -20px rgba(0,0,0,0.08); border: 1px solid #f1f5f9; }
        .input-main { width: 100%; padding: 1.1rem; background: #f8fafc; border: 2px solid #f1f5f9; border-radius: 1.2rem; outline: none; transition: 0.3s; font-weight: 700; text-align: center; }
        .input-main:focus { border-color: #6366f1; background: white; }
        .btn-active { background: #1e1b4b; color: white; cursor: pointer; border-radius: 1.2rem; font-weight: 800; transition: 0.3s; }
        .btn-inactive { background: #f1f5f9; color: #cbd5e1; cursor: not-allowed; border-radius: 1.2rem; font-weight: 800; }
        .dashboard-view { display: none; padding-top: 7rem; width: 100%; max-width: 1200px; margin: 0 auto; px: 1.5rem; }
        .dashboard-view.active { display: block; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .status-tag { padding: 4px 12px; border-radius: 20px; font-size: 10px; font-weight: 900; text-transform: uppercase; }
        .modal-sys { display: none; position: fixed; inset: 0; background: rgba(15,23,42,0.7); backdrop-filter: blur(8px); z-index: 9000; align-items: center; justify-content: center; padding: 2rem; }
        .modal-sys.active { display: flex; }
        .toast-sys { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%); background: #1e1b4b; color: white; padding: 1rem 2rem; border-radius: 1.2rem; z-index: 9999; display: none; font-weight: 800; }
    </style>
</head>
<body class="antialiased">

    <nav class="fixed top-0 inset-x-0 h-20 bg-white/90 backdrop-blur-md z-[1000] px-8 flex justify-between items-center border-b border-slate-100">
        <div onclick="location.reload()" class="text-3xl font-black italic cursor-pointer tracking-tighter">LOCALITY</div>
        <div id="nav-user" class="text-xs font-bold text-indigo-600"></div>
        <div class="flex gap-3">
            <button onclick="logout()" class="text-[9px] font-black text-red-400 uppercase border px-3 py-1 rounded-full">Logout</button>
            <button onclick="openAdmin()" class="text-[9px] font-black text-slate-300 border px-3 py-1 rounded-full">Admin</button>
        </div>
    </nav>

    <main id="auth-section" class="pt-32 pb-10 px-4 flex items-center justify-center">
        <div id="auth-box" class="glass-card w-full max-w-xl p-10 space-y-8">
            <div id="step-id" class="space-y-6">
                <div class="text-center"><h2 class="text-3xl font-black italic">LOCALITY</h2><p class="text-indigo-500 font-bold text-xs uppercase tracking-widest">Digital Logistics Ecosystem</p></div>
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="socialLogin('google')" class="flex items-center justify-center gap-2 py-3 border rounded-2xl font-bold text-xs hover:bg-slate-50 transition"><img src="https://www.google.com/favicon.ico" class="w-4 h-4"> Google</button>
                    <button onclick="socialLogin('facebook')" class="flex items-center justify-center gap-2 py-3 border rounded-2xl font-bold text-blue-700 hover:bg-slate-50 transition">Facebook</button>
                </div>
                <input id="login-input" type="text" placeholder="הקש נייד או מייל" oninput="validateAuth(this.value)" class="input-main text-xl">
                <button id="btn-next" disabled onclick="handleIdentify()" class="w-full py-4 btn-inactive">המשך לזיהוי</button>
                <p class="text-center text-[9px] text-slate-200 font-black uppercase">Build v56.0 Final</p>
            </div>

            <div id="step-password" class="hidden space-y-6 text-center">
                <h3 id="welcome-msg" class="text-2xl font-black text-indigo-950 italic"></h3>
                <input id="login-pass" type="password" placeholder="הזן סיסמה" class="input-main">
                <button onclick="loginUser()" class="w-full py-4 btn-active shadow-xl">כניסה למערכת</button>
            </div>

            <div id="step-role" class="hidden space-y-8 text-center">
                <div class="bg-indigo-50 p-6 rounded-[2.5rem] border border-indigo-100"><h3 class="text-xl font-black text-indigo-900">ברוכים הבאים! מי אתם?</h3></div>
                <div class="grid grid-cols-3 gap-3">
                    <div onclick="startRegister('לקוח')" class="p-6 bg-slate-50 rounded-3xl cursor-pointer hover:bg-white border-2 border-indigo-600 transition text-center text-xs font-black uppercase">🛒<br>לקוח</div>
                    <div onclick="startRegister('ספק')" class="p-6 bg-slate-50 rounded-3xl cursor-pointer hover:bg-white border-2 border-indigo-600 transition text-center text-xs font-black uppercase">🏭<br>ספק</div>
                    <div onclick="startRegister('חנות')" class="p-6 bg-slate-50 rounded-3xl cursor-pointer hover:bg-white border-2 border-indigo-600 transition text-center text-xs font-black uppercase">📍<br>חנות</div>
                </div>
            </div>

            <div id="step-form" class="hidden space-y-4 text-right">
                <div id="dynamic-fields" class="grid grid-cols-1 md:grid-cols-2 gap-4 max-h-96 overflow-y-auto px-2"></div>
                <div class="border-t pt-4 space-y-4">
                    <input id="reg-p1" type="password" placeholder="בחר סיסמה *" class="input-main py-3 text-sm">
                    <div class="flex items-center gap-3 bg-slate-50 p-4 rounded-2xl">
                        <input type="checkbox" id="terms-v" disabled class="w-6 h-6 accent-indigo-600">
                        <label class="text-[10px] font-bold text-slate-500">אישור <button onclick="openTerms()" class="text-indigo-600 underline">תקנון ולוגיסטיקה</button></label>
                    </div>
                </div>
                <button onclick="submitFinal()" id="reg-btn-text" class="w-full py-4 btn-active shadow-xl">סיום והרשמה</button>
            </div>
        </div>
    </main>

    <section id="dash-customer" class="dashboard-view px-6">
        <div class="flex justify-between items-center mb-10 border-b pb-6">
            <h1 class="text-4xl font-black italic">הזמנה חדשה</h1>
            <p id="cust-hub" class="text-indigo-600 font-bold text-xs"></p>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="bg-white p-6 rounded-[2.5rem] border shadow-sm space-y-4">
                <div class="h-32 bg-indigo-50 rounded-2xl flex items-center justify-center text-3xl">🧺</div>
                <h3 class="font-black">סל מוצרים מקומי</h3>
                <div class="flex justify-between items-center"><span class="font-black text-xl">₪ 120</span><button onclick="createOrder('סל מקומי', 120, 'משק ישי')" class="bg-indigo-950 text-white px-4 py-2 rounded-xl text-xs font-bold">הזמן</button></div>
            </div>
        </div>
        <div class="mt-12 space-y-4">
            <h2 class="font-black text-slate-400 uppercase text-sm">הזמנות שלי</h2>
            <div id="cust-orders" class="space-y-3"></div>
        </div>
    </section>

    <section id="dash-vendor" class="dashboard-view px-6">
        <h1 class="text-4xl font-black italic mb-10">ניהול אספקה (ספק)</h1>
        <div id="vendor-orders" class="space-y-4"></div>
    </section>

    <section id="dash-hub" class="dashboard-view px-6">
        <h1 class="text-4xl font-black italic mb-10">ניהול נקודת איסוף (Hub)</h1>
        <div id="hub-orders" class="space-y-4"></div>
    </section>

    <div id="modal-terms" class="modal-sys">
        <div class="bg-white p-10 rounded-[3rem] max-w-lg w-full">
            <h2 class="text-2xl font-black mb-4 italic">תקנון LOCALITY</h2>
            <div class="h-48 overflow-y-auto text-xs text-slate-500 leading-relaxed border-b mb-6">חובת ספק: אספקה בזמן לנקודה. חובת חנות: אחסון תקין. חובת לקוח: איסוף במועד.</div>
            <button onclick="closeTerms()" class="w-full py-4 bg-indigo-950 text-white rounded-2xl font-black">קראתי ואישרתי</button>
        </div>
    </div>

    <div id="sys-toast" class="toast-sys"></div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCKqnuCr2ejDPU74KDzw9LZQAk830KF78Q", authDomain: "locality-2a821.firebaseapp.com", projectId: "locality-2a821", storageBucket: "locality-2a821.firebasestorage.app", messagingSenderId: "1030549590558", appId: "1:1030549590558:web:b7876d795de5aa60a1140f" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let currentUser = null;
        let termsRead = false;

        function showToast(msg) { const t = document.getElementById('sys-toast'); t.innerText = msg; t.style.display = 'block'; setTimeout(() => t.style.display = 'none', 4000); }
        function validateAuth(v) { const ok = v.length > 5; document.getElementById('btn-next').disabled = !ok; document.getElementById('btn-next').className = ok ? "w-full py-4 btn-active" : "w-full py-4 btn-inactive"; }

        async function handleIdentify() {
            const id = document.getElementById('login-input').value;
            const snap = await db.collection("users").where("idKey", "==", id).get();
            document.getElementById('step-id').classList.add('hidden');
            if(snap.empty) { document.getElementById('step-role').classList.remove('hidden'); }
            else { currentUser = snap.docs[0].data(); document.getElementById('welcome-msg').innerText = `שלום ${currentUser.name.split(' ')[0]}!`; document.getElementById('step-password').classList.remove('hidden'); }
        }

        function startRegister(r) {
            role = r; document.getElementById('step-role').classList.add('hidden'); document.getElementById('step-form').classList.remove('hidden');
            let html = `<input id="f-name" placeholder="שם מלא *" class="input-main py-3 text-sm" required><input id="f-phone" placeholder="נייד *" class="input-main py-3 text-sm" required>`;
            if(r === 'לקוח') html += `<input id="f-addr" placeholder="כתובת מלאה *" class="input-main py-3 text-sm col-span-full" required>`;
            else if(r === 'ספק') html += `<input id="v-tax" placeholder="ח.פ *" class="input-main py-3 text-sm" required><input id="v-bank" placeholder="בנק וסניף *" class="input-main py-3 text-sm" required><input id="v-acc" placeholder="מספר חשבון *" class="input-main py-3 text-sm" required>`;
            else html += `<input id="h-point" placeholder="שם הנקודה *" class="input-main py-3 text-sm col-span-full" required><input id="h-addr" placeholder="כתובת גוגל *" class="input-main py-3 text-sm col-span-full" required>`;
            document.getElementById('dynamic-fields').innerHTML = html;
        }

        function openTerms() { document.getElementById('modal-terms').classList.add('active'); }
        function closeTerms() { document.getElementById('modal-terms').classList.remove('active'); termsRead = true; document.getElementById('terms-v').disabled = false; document.getElementById('terms-v').checked = true; }

        async function submitFinal() {
            if(!termsRead) return showToast("חובה לקרוא תקנון!");
            const data = { idKey: document.getElementById('login-input').value, name: document.getElementById('f-name').value, role: role, password: document.getElementById('reg-p1').value, status: role === 'לקוח' ? 'approved' : 'pending', address: document.getElementById('f-addr')?.value || document.getElementById('h-addr')?.value || 'השכונה', createdAt: new Date() };
            await db.collection("users").add(data);
            showToast("נרשמת! ממתין לאישור."); location.reload();
        }

        async function loginUser() {
            if(document.getElementById('login-pass').value === currentUser.password) {
                if(currentUser.status === 'pending') return showToast("ממתין לאישור אדמין.");
                enterDashboard();
            } else showToast("סיסמה שגויה.");
        }

        function enterDashboard() {
            document.getElementById('auth-section').classList.add('hidden');
            document.getElementById('nav-user').innerText = `${currentUser.name} | ${currentUser.role}`;
            if(currentUser.role === 'לקוח') { document.getElementById('dash-customer').classList.add('active'); document.getElementById('cust-hub').innerText = `שיוך לחנות: ${currentUser.address}`; loadCustOrders(); }
            else if(currentUser.role === 'ספק') { document.getElementById('dash-vendor').classList.add('active'); loadVendorOrders(); }
            else if(currentUser.role === 'חנות') { document.getElementById('dash-hub').classList.add('active'); loadHubOrders(); }
        }

        // LOGISTICS LOGIC
        async function createOrder(item, price, vName) {
            await db.collection("orders").add({ custId: currentUser.idKey, custName: currentUser.name, item, price, vName, hub: currentUser.address, status: 'ממתין לספק', time: new Date() });
            showToast("הזמנה נשלחה לספק!"); loadCustOrders();
        }

        async function loadCustOrders() {
            const snap = await db.collection("orders").where("custId", "==", currentUser.idKey).get();
            document.getElementById('cust-orders').innerHTML = snap.docs.map(doc => `<div class="p-4 bg-white border rounded-2xl flex justify-between items-center"><p class="font-bold text-xs">${doc.data().item}</p><span class="status-tag ${doc.data().status === 'הגיע לנקודה' ? 'bg-emerald-500 text-white' : 'bg-amber-100 text-amber-600'}">${doc.data().status}</span></div>`).join('');
        }

        async function loadVendorOrders() {
            const snap = await db.collection("orders").where("vName", "==", currentUser.name).get();
            document.getElementById('vendor-orders').innerHTML = snap.docs.map(doc => doc.data().status === 'ממתין לספק' ? `<div class="p-6 bg-white border rounded-3xl flex justify-between items-center"><div><p class="font-black">${doc.data().item}</p><p class="text-[10px]">יעד: ${doc.data().hub}</p></div><button onclick="updateOrder('${doc.id}', 'הופץ לנקודה')" class="bg-indigo-600 text-white px-6 py-2 rounded-xl text-xs font-bold">סיפקתי</button></div>` : '').join('');
        }

        async function loadHubOrders() {
            const snap = await db.collection("orders").where("hub", "==", currentUser.address).get();
            document.getElementById('hub-orders').innerHTML = snap.docs.map(doc => doc.data().status === 'הופץ לנקודה' ? `<div class="p-6 bg-white border rounded-3xl flex justify-between items-center"><div><p class="font-black">${doc.data().item}</p><p class="text-[10px]">לקוח: ${doc.data().custName}</p></div><button onclick="updateOrder('${doc.id}', 'הגיע לנקודה')" class="bg-emerald-500 text-white px-6 py-2 rounded-xl text-xs font-bold">אישרתי הגעה</button></div>` : '').join('');
        }

        async function updateOrder(id, stat) { 
            await db.collection("orders").doc(id).update({ status: stat }); 
            showToast(stat === 'הגיע לנקודה' ? "SMS נשלח ללקוח: הסחורה הגיעה!" : "סטטוס עודכן."); 
            location.reload(); 
        }

        function logout() { location.reload(); }
        function openAdmin() { if(prompt("Admin:") === "1234") showToast("כניסה לאדמין..."); }
    </script>
</body>
</html>
