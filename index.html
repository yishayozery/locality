<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Locality - Precision System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700;800&display=swap');
        body { font-family: 'Assistant', sans-serif; background: #f8fafc; color: #0f172a; }
        .page { display: none; min-height: 100vh; flex-direction: column; }
        .page.active { display: flex; }
        .card { background: white; padding: 2.5rem; border-radius: 2.5rem; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.08); width: 100%; max-width: 550px; }
        input, select, textarea { width: 100%; padding: 14px; border: 1px solid #e2e8f0; border-radius: 14px; outline: none; font-size: 15px; background: #fcfdfe; }
        input:focus { border-color: #4f46e5; ring: 3px rgba(79, 70, 229, 0.1); }
        label { display: block; font-size: 11px; font-weight: 800; color: #64748b; margin-bottom: 6px; margin-right: 4px; text-transform: uppercase; }
        .btn-main { background: #4f46e5; color: white; padding: 16px; border-radius: 16px; font-weight: 800; width: 100%; transition: 0.2s; }
        .btn-main:hover { background: #4338ca; transform: translateY(-1px); }
        .step-indicator { display: flex; gap: 8px; justify-content: center; margin-bottom: 2rem; }
        .step-dot { width: 10px; height: 10px; border-radius: 50%; background: #e2e8f0; }
        .step-dot.active { background: #4f46e5; }
    </style>
</head>
<body>

    <div id="page-auth" class="page active items-center justify-center p-4">
        <div class="card relative">
            <div class="text-center mb-8">
                <h1 class="text-4xl font-black text-indigo-900 italic tracking-tighter">LOCALITY</h1>
                <p id="auth-subtitle" class="text-slate-400 text-xs mt-2">מערכת שיווק ישיר מהיצרן לצרכן</p>
            </div>

            <div id="section-identify" class="space-y-6">
                <div class="form-group">
                    <label>מספר נייד</label>
                    <input id="auth-phone" type="tel" placeholder="05XXXXXXXX" maxlength="10" class="text-center text-2xl font-bold tracking-widest">
                </div>
                <button onclick="handleIdentity()" class="btn-main">המשך לזירה</button>
            </div>

            <div id="section-login" class="hidden space-y-6">
                <p id="login-greet" class="text-center font-bold text-indigo-900"></p>
                <div class="form-group">
                    <label>סיסמה</label>
                    <input id="login-pass" type="password" class="text-center text-xl">
                </div>
                <button onclick="loginUser()" class="btn-main">התחברות</button>
                <div class="flex justify-between px-2">
                    <button onclick="resetFlow()" class="text-xs text-slate-400 underline italic">חזור / שנה נייד</button>
                    <button onclick="forgotPassword()" class="text-xs text-indigo-600 font-bold">שכחתי סיסמה</button>
                </div>
            </div>

            <div id="section-register" class="hidden space-y-4">
                <div class="bg-indigo-50 p-3 rounded-xl text-center border border-indigo-100 mb-4">
                    <p class="text-indigo-900 font-bold text-sm leading-tight">שלום, אנחנו לא מכירים!<br><span class="text-xs font-normal">מעבירים אותך לרישום מהיר</span></p>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-3 text-right">
                    <div class="col-span-full">
                        <label>סוג משתמש</label>
                        <select id="reg-role" onchange="toggleRegFields()" class="font-bold">
                            <option value="customer">לקוח קצה</option>
                            <option value="vendor">ספק / יצרן</option>
                            <option value="hub">נקודת איסוף (Hub)</option>
                        </select>
                    </div>

                    <div><label>שם מלא</label><input id="reg-name" type="text" placeholder="כפי שמופיע בת"ז/עסק"></div>
                    <div><label>אימייל</label><input id="reg-email" type="email" placeholder="email@example.com"></div>

                    <div id="fields-vendor" class="hidden col-span-full grid grid-cols-1 md:grid-cols-2 gap-3 border-t pt-4">
                        <div><label>שם העסק</label><input id="v-biz"></div>
                        <div><label>כתובת מלאה</label><input id="v-addr"></div>
                        <div><label>סוג הפצה</label>
                            <select id="v-dist"><option value="pickup">איסוף ממני</option><option value="delivery">מביא לנקודות</option></select>
                        </div>
                        <div><label>אזורי הגעה</label><input id="v-zones" placeholder="מרכז, ירושלים..."></div>
                        <div class="col-span-full bg-slate-50 p-3 rounded-xl border border-dashed">
                            <p class="text-[9px] font-black text-slate-400 mb-2">פרטי בנק (רשימה סגורה - אפיון)</p>
                            <div class="grid grid-cols-2 gap-2">
                                <input id="v-bank-name" placeholder="שם הבנק" class="text-xs p-2">
                                <input id="v-bank-acc" placeholder="מס' חשבון" class="text-xs p-2">
                            </div>
                        </div>
                    </div>

                    <div id="fields-hub" class="hidden col-span-full grid grid-cols-1 md:grid-cols-2 gap-3 border-t pt-4">
                        <div><label>שם הנקודה</label><input id="h-point"></div>
                        <div><label>כתובת (מאומת גוגל)</label><input id="h-addr"></div>
                        <div><label>אזור שייכות</label><input id="h-zone"></div>
                        <div class="col-span-full"><label>לוגיסטיקה</label>
                            <select id="h-logic"><option>יכול לאסוף מספק</option><option>רק הגעה מספק</option></select>
                        </div>
                    </div>

                    <div class="col-span-full">
                        <label>בחר סיסמה (אותיות ומספרים)</label>
                        <input id="reg-pass" type="password">
                    </div>
                </div>

                <div class="flex items-center gap-2 py-2">
                    <input type="checkbox" id="reg-terms" class="w-4 h-4">
                    <label for="reg-terms" class="text-[10px] text-slate-500">קראתי ואישרתי את נהלי המערכת (האפיון הקובע)</label>
                </div>
                
                <div class="flex gap-2">
                    <button onclick="resetFlow()" class="flex-1 bg-slate-100 text-slate-600 py-3 rounded-xl font-bold text-sm">ביטול</button>
                    <button onclick="handleRegister()" class="flex-[2] btn-main">הגש בקשה לאישור</button>
                </div>
            </div>
        </div>
    </div>

    <div id="page-shop" class="page bg-white">
        <nav class="p-4 border-b flex justify-between items-center bg-indigo-900 text-white">
            <h1 class="font-black italic text-emerald-400">LOCALITY</h1>
            <div class="flex items-center gap-4">
                <span id="user-display" class="text-xs font-bold"></span>
                <button onclick="resetFlow()" class="text-[10px] bg-white/10 px-2 py-1 rounded">התנתק</button>
            </div>
        </nav>
        <main class="p-6 max-w-4xl mx-auto w-full text-center">
            <div class="mb-8 p-10 bg-slate-50 rounded-[3rem] border">
                <h2 class="text-3xl font-black mb-2">ברוך הבא לנקודת האיסוף</h2>
                <p class="text-slate-400 italic">המערכת משייכת אותך לנקודה הקרובה ביותר לכתובתך.</p>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div class="aspect-square bg-slate-100 rounded-3xl flex items-center justify-center text-slate-300 font-bold uppercase tracking-tighter italic">No Products Yet</div>
                <div class="aspect-square bg-slate-100 rounded-3xl flex items-center justify-center text-slate-300 font-bold uppercase tracking-tighter italic">Hub Assigned</div>
            </div>
        </main>
    </div>

    <script>
        // DB Management (LocalStorage)
        let db = JSON.parse(localStorage.getItem('locality_db_v19')) || [];
        let currentPhone = "";

        function handleIdentity() {
            currentPhone = document.getElementById('auth-phone').value;
            if (currentPhone.length !== 10) return alert("מספר נייד חייב להכיל 10 ספרות בדיוק.");

            const user = db.find(u => u.phone === currentPhone);
            document.getElementById('section-identify').classList.add('hidden');

            if (user) {
                document.getElementById('section-login').classList.remove('hidden');
                document.getElementById('login-greet').innerText = `שלום שוב, ${user.name}!`;
            } else {
                document.getElementById('section-register').classList.remove('hidden');
            }
        }

        function toggleRegFields() {
            const role = document.getElementById('reg-role').value;
            document.getElementById('fields-vendor').classList.toggle('hidden', role !== 'vendor');
            document.getElementById('fields-hub').classList.toggle('hidden', role !== 'hub');
        }

        function handleRegister() {
            const role = document.getElementById('reg-role').value;
            const name = document.getElementById('reg-name').value;
            const email = document.getElementById('reg-email').value;
            const pass = document.getElementById('reg-pass').value;
            const terms = document.getElementById('reg-terms').checked;

            if (!name || !email.includes('@') || !pass || !terms) return alert("אנא מלא את כל השדות בצורה תקינה ואשר תקנון.");

            const newUser = {
                id: Date.now(),
                phone: currentPhone,
                name, email, role, pass,
                status: (role === 'customer') ? 'approved' : 'pending'
            };

            db.push(newUser);
            localStorage.setItem('locality_db_v19', JSON.stringify(db));
            
            if (newUser.status === 'pending') {
                alert("הרישום בוצע! כספק/האב, עליך להמתין לאישור אדמין.");
                resetFlow();
            } else {
                enterSystem(newUser);
            }
        }

        function loginUser() {
            const pass = document.getElementById('login-pass').value;
            const user = db.find(u => u.phone === currentPhone && u.pass === pass);
            
            if (!user) return alert("סיסמה שגויה.");
            if (user.status === 'pending') return alert("החשבון ממתין לאישור אדמין.");
            
            enterSystem(user);
        }

        function enterSystem(user) {
            document.getElementById('page-auth').classList.remove('active');
            document.getElementById('page-shop').classList.add('active');
            document.getElementById('user-display').innerText = `${user.name} | ${user.role}`;
        }

        function resetFlow() { location.reload(); }
        function forgotPassword() { alert("הודעת שחזור סיסמה תשלח לנייד: " + currentPhone); }

        window.onload = () => {
            // בדיקת סשן קודם
            const saved = localStorage.getItem('locality_session');
            if(saved) enterSystem(JSON.parse(saved));
        };
    </script>
</body>
</html>
