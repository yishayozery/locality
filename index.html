<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOCALITY | המערכת הלוגיסטית</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@200;400;600;700;800&display=swap');
        body { font-family: 'Assistant', sans-serif; background: #fdfdfd; color: #1e1b4b; min-height: 100vh; }
        .input-box { width: 100%; padding: 1.2rem; background: #f8fafc; border: 2px solid #f1f5f9; border-radius: 1.5rem; outline: none; transition: 0.3s; font-weight: 700; text-align: center; font-size: 1.1rem; }
        .input-box:focus { border-color: #4f46e5; background: white; }
        .btn-entry { @apply w-full py-5 rounded-[2rem] font-black text-xl transition-all shadow-xl; }
        .btn-active { background: #1e1b4b; color: white; cursor: pointer; }
        .btn-inactive { background: #f1f5f9; color: #cbd5e1; cursor: not-allowed; }
        .role-card { @apply p-6 bg-slate-50 border-2 border-transparent rounded-[2.5rem] cursor-pointer transition-all hover:border-indigo-600 hover:bg-white text-center; }
        .eye-btn { position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); cursor: pointer; opacity: 0.5; }
        .admin-modal { display: none; position: fixed; inset: 0; background: #f8fafc; z-index: 5000; overflow-y: auto; padding: 2rem; }
    </style>
</head>
<body class="antialiased">

    <nav class="fixed top-0 inset-x-0 h-24 bg-white/80 backdrop-blur-md z-[1000] px-10 flex justify-between items-center border-b border-slate-50">
        <div onclick="location.reload()" class="text-3xl font-black italic cursor-pointer tracking-tighter">LOCALITY</div>
        <div class="flex items-center gap-6">
            <button onclick="openAdmin()" class="text-[9px] font-black text-slate-300 border border-slate-100 px-3 py-1 rounded-full uppercase">Admin Control</button>
            <button onclick="alert('הפנייה נשלחה למנהל השירות')" class="text-sm font-extrabold text-indigo-600">צור קשר</button>
        </div>
    </nav>

    <main class="pt-32 pb-20 px-4 flex items-center justify-center min-h-screen">
        <div id="auth-card" class="bg-white border border-slate-100 w-full max-w-2xl p-12 rounded-[4rem] shadow-2xl transition-all">
            
            <div id="step-id" class="space-y-8">
                <div class="text-center space-y-2">
                    <h2 class="text-4xl font-black italic italic tracking-tighter">LOCALITY</h2>
                    <p class="text-indigo-600 font-bold">מחברים אותך ישירות לקהילה וליצרן</p>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <button onclick="socialLogin('google')" class="flex items-center justify-center gap-3 py-4 border-2 border-slate-50 rounded-2xl font-bold text-xs hover:bg-slate-50 transition"><img src="https://www.google.com/favicon.ico" class="w-4 h-4"> Google</button>
                    <button onclick="socialLogin('facebook')" class="flex items-center justify-center gap-3 py-4 border-2 border-slate-50 rounded-2xl font-bold text-blue-700 hover:bg-slate-50 transition">Facebook</button>
                </div>

                <div class="space-y-4">
                    <input id="auth-input" type="text" placeholder="הקש נייד או מייל להתחברות" oninput="validateAuth(this.value)" class="input-box">
                    <button id="btn-next" disabled onclick="handleIdentify()" class="btn-entry btn-inactive">כניסה</button>
                </div>
            </div>

            <div id="step-password" class="hidden space-y-6 text-center">
                <h3 class="text-2xl font-black text-indigo-950">ברוך השב!</h3>
                <div class="relative">
                    <input id="login-pass" type="password" placeholder="הזן סיסמה" class="input-box">
                    <span onclick="togglePass('login-pass')" class="eye-btn">👁️</span>
                </div>
                <button onclick="loginUser()" class="btn-entry btn-active">כניסה למערכת</button>
            </div>

            <div id="step-role" class="hidden space-y-12 text-center">
                <div class="bg-indigo-50 p-8 rounded-[3rem] border border-indigo-100">
                    <h3 class="text-2xl font-black text-indigo-900">שלום, אנחנו לא מכירים!</h3>
                    <p class="text-indigo-600 font-bold mt-2">מעבירים אותך לרישום מהיר לפי סוג הפעילות</p>
                </div>
                <div class="grid grid-cols-3 gap-4">
                    <div onclick="startRegister('לקוח')" class="role-card"><span class="text-4xl block mb-2">🛒</span><span class="text-[10px] font-black uppercase">לקוח</span></div>
                    <div onclick="startRegister('ספק')" class="role-card"><span class="text-4xl block mb-2">🏭</span><span class="text-[10px] font-black uppercase">ספק</span></div>
                    <div onclick="startRegister('חנות')" class="role-card"><span class="text-4xl block mb-2">📍</span><span class="text-[10px] font-black uppercase">חנות</span></div>
                </div>
            </div>

            <div id="step-form" class="hidden space-y-6 text-right">
                <div id="reg-fields" class="grid grid-cols-1 md:grid-cols-2 gap-4 max-h-[50vh] overflow-y-auto pr-2"></div>
                
                <div class="border-t pt-6 space-y-4">
                    <div class="grid grid-cols-2 gap-4">
                        <div class="relative"><input id="reg-p1" type="password" placeholder="בחר סיסמה" class="input-box text-sm py-4"><span onclick="togglePass('reg-p1')" class="eye-btn">👁️</span></div>
                        <div class="relative"><input id="reg-p2" type="password" placeholder="אימות סיסמה" class="input-box text-sm py-4"><span onclick="togglePass('reg-p2')" class="eye-btn">👁️</span></div>
                    </div>
                    <div class="flex items-center gap-3 bg-slate-50 p-5 rounded-3xl">
                        <input type="checkbox" id="reg-terms" class="w-7 h-7 accent-indigo-600">
                        <label class="text-xs font-bold text-slate-500 italic">אני מאשר את תנאי השימוש של LOCALITY</label>
                    </div>
                </div>
                <button id="reg-btn-text" onclick="finalizeRegistration()" class="btn-entry btn-active shadow-2xl">סיום והעבר אותי להמשך</button>
            </div>
        </div>
    </main>

    <div id="admin-panel" class="admin-modal">
        <div class="max-w-6xl mx-auto">
            <div class="flex justify-between items-center border-b pb-8 mb-10">
                <h1 class="text-5xl font-black text-indigo-950 italic">Admin Center</h1>
                <button onclick="location.reload()" class="bg-indigo-950 text-white px-8 py-3 rounded-full font-bold">יציאה מהניהול</button>
            </div>
            <div id="pending-approvals" class="grid grid-cols-1 gap-4"></div>
        </div>
    </div>

    <script>
        // --- FIREBASE CONFIG ---
        const firebaseConfig = {
            apiKey: "AIzaSyCKqnuCr2ejDPU74KDzw9LZQAk830KF78Q",
            authDomain: "locality-2a821.firebaseapp.com",
            projectId: "locality-2a821",
            storageBucket: "locality-2a821.firebasestorage.app",
            messagingSenderId: "1030549590558",
            appId: "1:1030549590558:web:b7876d795de5aa60a1140f"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let currentId = '';
        let role = '';
        let existingUser = null;

        function togglePass(id) { const el = document.getElementById(id); el.type = el.type === 'password' ? 'text' : 'password'; }

        function validateAuth(val) {
            const btn = document.getElementById('btn-next');
            const isValid = /^\d{10}$/.test(val) || /\S+@\S+\.\S+/.test(val);
            btn.disabled = !isValid;
            btn.className = isValid ? "btn-entry btn-active" : "btn-entry btn-inactive";
        }

        async function handleIdentify() {
            currentId = document.getElementById('auth-input').value;
            const snap = await db.collection("users").where("idKey", "==", currentId).get();
            document.getElementById('step-id').classList.add('hidden');
            if (snap.empty) {
                document.getElementById('step-role').classList.remove('hidden');
            } else {
                existingUser = snap.docs[0].data();
                document.getElementById('step-password').classList.remove('hidden');
            }
        }

        function startRegister(r) {
            role = r;
            document.getElementById('step-role').classList.add('hidden');
            document.getElementById('step-form').classList.remove('hidden');
            const cont = document.getElementById('reg-fields');
            const mainBtn = document.getElementById('reg-btn-text');
            
            let html = `<input id="f-name" placeholder="שם מלא (חובה)" class="input-box text-sm">
                        <input id="f-email" placeholder="אימייל" class="input-box text-sm" value="${currentId.includes('@')?currentId:''}">
                        <input id="f-phone" placeholder="נייד ראשי" class="input-box text-sm" value="${!currentId.includes('@')?currentId:''}">`;

            if(r === 'לקוח') {
                html += `<input id="f-phone2" placeholder="נייד נוסף" class="input-box text-sm">
                         <input id="f-addr" placeholder="כתובת מגורים מלאה (לשיווק חנות)" class="input-box text-sm col-span-full">`;
                mainBtn.innerText = "העבר אותי לנקודת האיסוף שלי";
            } else if(r === 'ספק') {
                html += `<input id="v-biz" placeholder="שם העסק" class="input-box text-sm">
                         <input id="v-tax" placeholder="ח.פ / עוסק" class="input-box text-sm">
                         <input id="v-addr" placeholder="כתובת העסק" class="input-box text-sm col-span-full">
                         <div class="col-span-full grid grid-cols-4 gap-2 bg-slate-50 p-4 rounded-3xl">
                            <input id="v-b1" placeholder="בעל ח-ן" class="text-[9px] p-2 border rounded-lg"><input id="v-b2" placeholder="בנק" class="text-[9px] p-2 border rounded-lg">
                            <input id="v-b3" placeholder="סניף" class="text-[9px] p-2 border rounded-lg"><input id="v-b4" placeholder="ח-ן" class="text-[9px] p-2 border rounded-lg">
                         </div>
                         <select id="v-dist" class="input-box text-sm"><option value="pickup">איסוף ממני</option><option value="delivery">מביא לנקודות</option></select>
                         <input id="v-cat" placeholder="קטגוריות מוצרים" class="input-box text-sm">
                         <select id="v-fair" class="input-box text-sm"><option>יריד מכירות? לא</option><option>יריד מכירות? כן</option></select>`;
                mainBtn.innerText = "שלח בקשת ספק לאישור";
            } else if(r === 'חנות') {
                html += `<input id="h-point" placeholder="שם הנקודה" class="input-box text-sm col-span-full">
                         <input id="h-addr" placeholder="כתובת מאומתת (גוגל)" class="input-box text-sm col-span-full">
                         <input id="h-zone" placeholder="אזור שייכות" class="input-box text-sm">
                         <textarea id="h-notes" placeholder="הערות לאיסוף" class="input-box text-sm h-24 col-span-full"></textarea>`;
                mainBtn.innerText = "שלח בקשת חנות לאישור";
            }
            cont.innerHTML = html;
        }

        async function finalizeRegistration() {
            if(document.getElementById('reg-p1').value !== document.getElementById('reg-p2').value) return alert("הסיסמאות לא זהות");
            if(!document.getElementById('reg-terms').checked) return alert("חובה לאשר תנאים");
            
            const data = { 
                idKey: currentId, name: document.getElementById('f-name').value, role: role, 
                password: document.getElementById('reg-p1').value, 
                status: role === 'לקוח' ? 'approved' : 'pending', createdAt: new Date()
            };
            await db.collection("users").add(data);
            alert(role === 'לקוח' ? "ברוך הבא! המערכת מזהה אותך." : "הבקשה הועברה לאישור אדמין.");
            location.reload();
        }

        async function loginUser() {
            if(document.getElementById('login-pass').value === existingUser.password) {
                alert(`שלום ${existingUser.name}, נכנסת בהצלחה!`);
                location.reload();
            } else { alert("סיסמה שגויה."); }
        }

        function openAdmin() {
            if(prompt("Admin Access:") === "1234") {
                document.getElementById('admin-panel').style.display = 'block';
                loadAdmin();
            }
        }

        async function loadAdmin() {
            const snap = await db.collection("users").where("status", "==", "pending").get();
            const list = document.getElementById('pending-approvals');
            list.innerHTML = snap.docs.map(doc => `
                <div class="bg-white p-6 rounded-3xl shadow flex justify-between items-center">
                    <div><p class="font-black text-indigo-900 text-xl">${doc.data().name} (${doc.data().role})</p><p class="text-xs text-slate-400">${doc.data().idKey}</p></div>
                    <button onclick="approveUser('${doc.id}')" class="bg-emerald-500 text-white px-8 py-3 rounded-full font-bold">אשר עכשיו</button>
                </div>
            `).join('');
        }

        async function approveUser(id) { await db.collection("users").doc(id).update({status:'approved'}); loadAdmin(); }
        async function socialLogin(p) { const prov = p === 'google' ? new firebase.auth.GoogleAuthProvider() : new firebase.auth.FacebookAuthProvider(); await firebase.auth().signInWithPopup(prov); }
    </script>
</body>
</html>
