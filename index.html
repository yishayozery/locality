<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOCALITY | Smart Logistics v41.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@200;400;600;700;800&display=swap');
        body { font-family: 'Assistant', sans-serif; background: #ffffff; color: #1e1b4b; min-height: 100vh; display: flex; flex-direction: column; }
        .auth-card { background: white; border-radius: 3.5rem; box-shadow: 0 40px 100px -20px rgba(0,0,0,0.08); border: 1px solid #f1f5f9; width: 100%; max-width: 500px; padding: 2.5rem; }
        .input-main { width: 100%; padding: 1.1rem; background: #f8fafc; border: 2px solid #f1f5f9; border-radius: 1.2rem; outline: none; transition: 0.3s; font-weight: 700; text-align: center; }
        .btn-entry { width: 100%; padding: 1.1rem; border-radius: 1.2rem; font-weight: 800; font-size: 1.2rem; transition: 0.3s; margin-top: 0.5rem; }
        .btn-active { background: #1e1b4b; color: #fff; cursor: pointer; }
        .btn-inactive { background: #f1f5f9; color: #cbd5e1; cursor: not-allowed; }
        .dashboard-page { display: none; padding-top: 6rem; width: 100%; max-width: 1200px; margin: 0 auto; }
        .dashboard-page.active { display: block; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .toast-sys { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%); background: #1e1b4b; color: white; padding: 1rem 2rem; border-radius: 1rem; z-index: 6000; display: none; font-weight: 700; }
    </style>
</head>
<body class="antialiased">

    <nav class="fixed top-0 inset-x-0 h-20 bg-white/90 backdrop-blur-md z-[1000] px-8 flex justify-between items-center border-b border-slate-50">
        <div onclick="location.reload()" class="text-3xl font-black italic cursor-pointer tracking-tighter">LOCALITY</div>
        <div class="flex gap-4">
            <button id="nav-logout" onclick="logout()" class="hidden text-xs font-black text-red-500 uppercase">התנתקות</button>
            <button onclick="openAdmin()" class="text-[9px] font-black text-slate-300 border border-slate-100 px-3 py-1 rounded-full uppercase">Admin</button>
        </div>
    </nav>

    <main id="auth-section" class="flex-grow pt-24 pb-6 px-4 flex items-center justify-center">
        <div id="auth-box" class="auth-card">
            <div id="step-id" class="space-y-6">
                <h2 class="text-2xl font-black text-center tracking-tighter">כניסה לזירה</h2>
                <div class="grid grid-cols-1 gap-3">
                    <button onclick="loginSocial('google')" class="flex items-center justify-center gap-3 w-full py-3 border rounded-2xl font-bold text-xs hover:bg-slate-50 transition"><img src="https://www.google.com/favicon.ico" class="w-4 h-4"> Google</button>
                    <button onclick="loginSocial('facebook')" class="flex items-center justify-center gap-3 w-full py-3 border rounded-2xl font-bold text-blue-700 hover:bg-slate-50 transition">Facebook</button>
                </div>
                <input id="login-input" type="text" placeholder="הקש נייד או מייל להתחברות" oninput="validateInput(this.value)" class="input-main">
                <button id="btn-submit" disabled onclick="handleIdentify()" class="btn-entry btn-inactive">כניסה</button>
            </div>

            <div id="step-password" class="hidden space-y-6 text-center">
                <h3 id="welcome-msg" class="text-2xl font-black text-indigo-950">איזה כיף שחזרת!</h3>
                <input id="login-pass" type="password" placeholder="הזן סיסמה" class="input-main">
                <button onclick="loginUser()" class="btn-entry btn-active">כניסה למערכת</button>
            </div>

            <div id="step-role" class="hidden space-y-8 text-center">
                <div class="bg-indigo-50 p-6 rounded-[2.5rem] border border-indigo-100"><h3 class="text-xl font-black text-indigo-950">שלום, אנחנו לא מכירים!</h3></div>
                <div class="grid grid-cols-3 gap-3">
                    <div onclick="startRegister('לקוח')" class="p-4 bg-slate-50 rounded-3xl cursor-pointer hover:bg-white border-2 border-transparent hover:border-indigo-600 transition text-center">🛒<br><span class="text-[9px] font-bold">לקוח</span></div>
                    <div onclick="startRegister('ספק')" class="p-4 bg-slate-50 rounded-3xl cursor-pointer hover:bg-white border-2 border-transparent hover:border-indigo-600 transition text-center">🏭<br><span class="text-[9px] font-bold">ספק</span></div>
                    <div onclick="startRegister('חנות')" class="p-4 bg-slate-50 rounded-3xl cursor-pointer hover:bg-white border-2 border-transparent hover:border-indigo-600 transition text-center">📍<br><span class="text-[9px] font-bold">חנות</span></div>
                </div>
            </div>

            <div id="step-form" class="hidden space-y-4 text-right">
                <div id="dynamic-fields" class="grid grid-cols-1 md:grid-cols-2 gap-3"></div>
                <div class="border-t pt-4 space-y-4">
                    <input id="reg-p1" type="password" placeholder="בחר סיסמה" class="input-main py-3 text-sm">
                    <div class="flex items-center gap-3 bg-slate-50 p-4 rounded-2xl">
                        <input type="checkbox" id="terms-v" class="w-6 h-6 accent-indigo-600">
                        <label class="text-[10px] font-bold text-slate-500 leading-tight">אני מאשר את תנאי השימוש של LOCALITY</label>
                    </div>
                </div>
                <button onclick="submitFinal()" id="reg-btn-text" class="btn-entry btn-active shadow-xl">סיום רישום</button>
            </div>
        </div>
    </main>

    <section id="dash-customer" class="dashboard-page px-6">
        <div class="flex justify-between items-center mb-10">
            <h1 class="text-4xl font-black text-indigo-950">החנות הקרובה אליך</h1>
            <p id="hub-location" class="bg-indigo-50 px-4 py-2 rounded-full text-indigo-600 font-bold text-sm italic">מאתר מיקום...</p>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="bg-white p-8 rounded-[3rem] shadow-sm border h-64 flex items-center justify-center text-slate-300 italic">מוצרים יופיעו כאן בקרוב...</div>
            <div class="bg-white p-8 rounded-[3rem] shadow-sm border h-64 flex items-center justify-center text-slate-300 italic">המבצעים של השבוע...</div>
            <div class="bg-white p-8 rounded-[3rem] shadow-sm border h-64 flex items-center justify-center text-slate-300 italic">ספקים חדשים בנקודה...</div>
        </div>
    </section>

    <section id="dash-vendor" class="dashboard-page px-6">
        <h1 class="text-4xl font-black text-indigo-950 mb-10 italic">ניהול מלאי ספק</h1>
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
            <div class="bg-indigo-950 text-white p-8 rounded-[2.5rem] shadow-xl">
                <p class="text-xs font-bold opacity-50 uppercase mb-2 tracking-widest">מכירות החודש</p>
                <p class="text-3xl font-black">₪ 0.00</p>
            </div>
            <button class="bg-white border-2 border-dashed border-slate-200 p-8 rounded-[2.5rem] flex flex-col items-center justify-center hover:border-indigo-600 transition group">
                <span class="text-3xl mb-2 group-hover:scale-110 transition">+</span>
                <span class="font-bold text-xs uppercase">הוספת מוצר חדש</span>
            </button>
        </div>
    </section>

    <section id="dash-hub" class="dashboard-page px-6">
        <h1 class="text-4xl font-black text-indigo-950 mb-10">ניהול נקודת איסוף</h1>
        <div class="bg-white p-10 rounded-[3rem] border border-slate-100">
            <p class="text-slate-400 italic">כאן יופיעו ההזמנות הממתינות לאיסוף בנקודה שלך...</p>
        </div>
    </section>

    <div id="sys-toast" class="toast-sys"></div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCKqnuCr2ejDPU74KDzw9LZQAk830KF78Q",
            authDomain: "locality-2a821.firebaseapp.com",
            projectId: "locality-2a821",
            storageBucket: "locality-2a821.firebasestorage.app",
            messagingSenderId: "1030549590558",
            appId: "1:1030549590558:web:b7876d795de5aa60a1140f"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let currentId = '';
        let role = '';
        let existingUser = null;

        function showToast(msg) {
            const t = document.getElementById('sys-toast');
            t.innerText = msg; t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 3000);
        }

        function validateInput(val) {
            const btn = document.getElementById('btn-submit');
            const ok = /^\d{10}$/.test(val) || /\S+@\S+\.\S+/.test(val);
            btn.disabled = !ok;
            btn.classList.toggle('btn-active', ok);
            btn.classList.toggle('btn-inactive', !ok);
        }

        async function handleIdentify() {
            currentId = document.getElementById('login-input').value;
            const snap = await db.collection("users").where("idKey", "==", currentId).get();
            document.getElementById('step-id').classList.add('hidden');
            if (snap.empty) {
                document.getElementById('step-role').classList.remove('hidden');
            } else {
                existingUser = snap.docs[0].data();
                document.getElementById('welcome-msg').innerText = `איזה כיף שחזרת, ${existingUser.name.split(' ')[0]}!`;
                document.getElementById('step-password').classList.remove('hidden');
            }
        }

        function startRegister(r) {
            role = r;
            document.getElementById('step-role').classList.add('hidden');
            document.getElementById('step-form').classList.remove('hidden');
            const cont = document.getElementById('dynamic-fields');
            const btn = document.getElementById('reg-btn-text');
            
            let common = `<input id="f-name" placeholder="שם מלא (חובה)" class="input-main py-3 text-sm">
                          <input id="f-email" placeholder="אימייל" class="input-main py-3 text-sm" value="${currentId.includes('@')?currentId:''}">
                          <input id="f-phone" placeholder="נייד" class="input-main py-3 text-sm" value="${!currentId.includes('@')?currentId:''}">`;

            if(role === 'לקוח') {
                cont.innerHTML = common + `<input id="f-addr" placeholder="כתובת לשיווק חנות" class="input-main py-3 text-sm col-span-full">`;
                btn.innerText = "העברה לנקודת איסוף הקרובה אליך";
            } else if(role === 'ספק') {
                cont.innerHTML = common + `<input id="v-biz" placeholder="שם העסק" class="input-main py-3 text-sm">
                                            <div class="grid grid-cols-4 gap-1 col-span-full">
                                                <input id="v-b1" placeholder="בנק" class="text-[9px] p-2 border rounded-xl">
                                                <input id="v-b2" placeholder="סניף" class="text-[9px] p-2 border rounded-xl">
                                                <input id="v-b3" placeholder="חן" class="text-[9px] p-2 border rounded-xl">
                                                <input id="v-b4" placeholder="בעלים" class="text-[9px] p-2 border rounded-xl">
                                            </div>`;
                btn.innerText = "סיום רישום ספק";
            } else {
                cont.innerHTML = common + `<input id="h-addr" placeholder="כתובת הנקודה" class="input-main py-3 text-sm col-span-full">`;
                btn.innerText = "סיום רישום חנות";
            }
        }

        async function loginUser() {
            if (document.getElementById('login-pass').value === existingUser.password) {
                if(existingUser.status === 'pending') return showToast("החשבון ממתין לאישור אדמין.");
                enterDashboard(existingUser);
            } else { showToast("סיסמה שגויה."); }
        }

        async function submitFinal() {
            if(!document.getElementById('terms-v').checked) return showToast("חובה לאשר תנאים");
            const data = { 
                idKey: currentId, name: document.getElementById('f-name').value, 
                role: role, password: document.getElementById('reg-p1').value, 
                status: role === 'לקוח' ? 'approved' : 'pending',
                address: document.getElementById('f-addr')?.value || document.getElementById('h-addr')?.value || ''
            };
            await db.collection("users").add(data);
            if(role === 'לקוח') enterDashboard(data);
            else { showToast("הבקשה הועברה לאישור אדמין."); location.reload(); }
        }

        function enterDashboard(user) {
            document.getElementById('auth-section').classList.add('hidden');
            document.getElementById('nav-logout').classList.remove('hidden');
            
            if(user.role === 'לקוח') {
                document.getElementById('dash-customer').classList.add('active');
                document.getElementById('hub-location').innerText = `חנות ${user.address.split(' ')[0] || 'השכונה'}`;
            } else if(user.role === 'ספק') {
                document.getElementById('dash-vendor').classList.add('active');
            } else {
                document.getElementById('dash-hub').classList.add('active');
            }
        }

        function logout() { location.reload(); }
        function openAdmin() { if(prompt("Admin Code:") === "1234") showToast("נפתח בטאב חדש..."); }
        async function loginSocial(p) { showToast("מתחבר..."); }
    </script>
</body>
</html>
