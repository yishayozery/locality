<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Locality - Production Setup</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700;800&display=swap');
        body { font-family: 'Assistant', sans-serif; background: #f1f5f9; }
        .page { display: none; min-height: 100vh; flex-direction: column; }
        .page.active { display: flex; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .form-card { background: white; padding: 2.5rem; border-radius: 3rem; box-shadow: 0 20px 50px rgba(0,0,0,0.1); width: 100%; max-width: 650px; }
        label { display: block; font-size: 12px; font-weight: 800; color: #475569; margin-bottom: 4px; margin-right: 4px; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 14px; outline: none; transition: 0.2s; }
        .input-error { border-color: #ef4444 !important; background: #fef2f2; }
        .strength-bar { height: 4px; border-radius: 2px; transition: 0.3s; margin-top: -8px; margin-bottom: 12px; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 2000; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .modal.active { display: flex; }
        .btn-disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
</head>
<body>

    <div id="page-auth" class="page active items-center justify-center p-4 py-12">
        <div class="form-card relative">
            <h1 class="text-5xl font-black text-indigo-900 text-center mb-8 italic">LOCALITY</h1>

            <div id="step-id" class="space-y-6">
                <div>
                    <label>נייד או אימייל להתחברות</label>
                    <input id="auth-input" type="text" placeholder="05XXXXXXXX" class="text-center text-2xl font-bold">
                </div>
                <button onclick="checkIdentity()" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-black shadow-lg">המשך</button>
            </div>

            <div id="step-role" class="hidden space-y-6 text-center">
                <div class="bg-indigo-50 p-4 rounded-2xl border border-indigo-100">
                    <p class="text-indigo-900 font-bold">שלום, אנחנו לא מכירים!</p>
                    <p class="text-indigo-700 text-xs">בוא נבצע רישום מהיר לפי סוג המשתמש שלך</p>
                </div>
                <div class="grid grid-cols-3 gap-3">
                    <button onclick="selectRole('customer')" id="r-customer" class="p-4 bg-slate-50 rounded-2xl border-2 border-transparent transition hover:border-indigo-200">🛒<br><span class="text-[10px] font-bold">לקוח</span></button>
                    <button onclick="selectRole('vendor')" id="r-vendor" class="p-4 bg-slate-50 rounded-2xl border-2 border-transparent transition hover:border-indigo-200">🏭<br><span class="text-[10px] font-bold">ספק</span></button>
                    <button onclick="selectRole('hub')" id="r-hub" class="p-4 bg-slate-50 rounded-2xl border-2 border-transparent transition hover:border-indigo-200">📍<br><span class="text-[10px] font-bold">חנות</span></button>
                </div>
            </div>

            <div id="step-details" class="hidden space-y-4 text-right overflow-y-auto max-h-[65vh] px-2">
                <div id="fields-container" class="grid grid-cols-1 md:grid-cols-2 gap-3"></div>
                
                <div class="border-t pt-4 space-y-4">
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label>סיסמה</label>
                            <input id="reg-pass" type="password" oninput="checkStrength(this.value)">
                            <div id="strength-meter" class="strength-bar w-full bg-slate-100"></div>
                        </div>
                        <div>
                            <label>אימות סיסמה</label>
                            <input id="reg-pass-confirm" type="password">
                        </div>
                    </div>
                    
                    <div class="flex items-center gap-2 py-2">
                        <input type="checkbox" id="reg-terms" class="w-5 h-5 accent-indigo-600">
                        <label for="reg-terms" class="text-[10px] text-slate-500">
                            אני מאשר את <button onclick="openTerms()" class="text-indigo-600 underline font-bold">תנאי השימוש</button>
                        </label>
                    </div>
                </div>
                <div id="error-box" class="text-red-500 text-[10px] font-bold hidden bg-red-50 p-3 rounded-xl"></div>
                <button onclick="submitFinal()" id="submit-btn" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-black shadow-xl">שלח לאישור</button>
            </div>
        </div>
    </div>

    <div id="modal-terms" class="modal">
        <div class="bg-white p-10 rounded-[3rem] max-w-2xl w-full relative">
            <button onclick="closeTerms()" class="absolute top-8 left-8 text-2xl text-slate-300">&times;</button>
            <h2 class="text-2xl font-black mb-6 italic">תנאי שימוש - LOCALITY</h2>
            <div id="terms-content" class="text-sm text-slate-600 leading-relaxed max-h-[40vh] overflow-y-auto pr-4 text-right">
                </div>
            <button onclick="closeTerms()" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold mt-8">הבנתי, סגור</button>
        </div>
    </div>

    <script>
        // --- FIREBASE CONFIG (STAY AS IS) ---
        const firebaseConfig = {
            apiKey: "AIzaSyCKqnuCr2ejDPU74KDzw9LZQAk830KF78Q",
            authDomain: "locality-2a821.firebaseapp.com",
            projectId: "locality-2a821",
            storageBucket: "locality-2a821.firebasestorage.app",
            messagingSenderId: "1030549590558",
            appId: "1:1030549590558:web:b7876d795de5aa60a1140f"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let currentId = '';
        let selectedRole = '';

        function checkIdentity() {
            currentId = document.getElementById('auth-input').value;
            if(!currentId) return alert("הזן פרט מזהה");
            document.getElementById('step-id').classList.add('hidden');
            document.getElementById('step-role').classList.remove('hidden');
        }

        function selectRole(role) {
            selectedRole = role;
            document.querySelectorAll('#step-role button').forEach(b => b.classList.remove('border-indigo-600', 'bg-indigo-50'));
            document.getElementById(`r-${role}`).classList.add('border-indigo-600', 'bg-indigo-50');
            setTimeout(() => {
                document.getElementById('step-role').classList.add('hidden');
                document.getElementById('step-details').classList.remove('hidden');
                renderFields();
            }, 400);
        }

        function renderFields() {
            const container = document.getElementById('fields-container');
            let common = `
                <div class="col-span-full font-black text-indigo-900 border-b pb-2 mb-2">פרטי רישום - ${selectedRole === 'vendor' ? 'ספק' : selectedRole === 'hub' ? 'חנות' : 'לקוח'}</div>
                <div><label>שם מלא</label><input id="f-name" required></div>
                <div><label>אימייל</label><input id="f-email" type="email" value="${currentId.includes('@')?currentId:''}"></div>
                <div><label>נייד</label><input id="f-phone" value="${!currentId.includes('@')?currentId:''}"></div>
            `;
            
            if(selectedRole === 'customer') {
                common += `<div><label>נייד נוסף לזמינות</label><input id="f-phone2"></div>`;
            } else if(selectedRole === 'vendor') {
                common += `
                    <div><label>שם העסק</label><input id="v-biz"></div>
                    <div><label>כתובת העסק</label><input id="v-addr"></div>
                    <div class="col-span-full grid grid-cols-2 md:grid-cols-4 gap-2 bg-slate-50 p-4 rounded-2xl">
                        <div class="col-span-full text-[10px] font-black opacity-50">פרטי בנק</div>
                        <input id="v-b-owner" placeholder="בעל החשבון">
                        <input id="v-b-name" placeholder="בנק">
                        <input id="v-b-branch" placeholder="סניף">
                        <input id="v-b-acc" placeholder="חשבון">
                    </div>
                    <div><label>סוג הפצה</label><select id="v-dist"><option>איסוף ממני</option><option>מביא לנקודות</option></select></div>
                    <div><label>קטגוריה</label><input id="v-cat"></div>
                `;
            } else if(selectedRole === 'hub') {
                common += `
                    <div><label>שם הנקודה</label><input id="h-point"></div>
                    <div><label>כתובת (גוגל)</label><input id="h-addr"></div>
                    <div><label>אזור שייכות</label><input id="h-zone"></div>
                    <div><label>לוגיסטיקה</label><select id="h-log"><option>יכול לאסוף מספק</option><option>רק הגעה מספק</option></select></div>
                `;
            }
            container.innerHTML = common;
        }

        function checkStrength(p) {
            const meter = document.getElementById('strength-meter');
            let s = 0;
            if(p.length > 5) s++;
            if(/[A-Z]/.test(p)) s++;
            if(/[0-9]/.test(p)) s++;
            const colors = ['#f1f5f9', '#ef4444', '#f59e0b', '#10b981'];
            meter.style.background = colors[s];
            meter.style.width = (s * 33.3) + '%';
        }

        function openTerms() {
            document.getElementById('modal-terms').classList.add('active');
            const content = document.getElementById('terms-content');
            const texts = {
                customer: "ברוך הבא ללקוח Locality. בתור לקוח אתה מתחייב לאסוף את ההזמנות בזמן...",
                vendor: "תנאי ספק: עליך לספק סחורה טרייה ותקינה לנקודות האיסוף לפי הלו\"ז...",
                hub: "תנאי נקודת איסוף: עליך לשמור על הסחורה בתנאים נאותים ולתת שירות אדיב ללקוחות..."
            };
            content.innerText = texts[selectedRole] || "תנאי שימוש כלליים...";
        }

        function closeTerms() { document.getElementById('modal-terms').classList.remove('active'); }

        async function submitFinal() {
            const errBox = document.getElementById('error-box');
            const pass = document.getElementById('reg-pass').value;
            const confirm = document.getElementById('reg-pass-confirm').value;
            const terms = document.getElementById('reg-terms').checked;
            
            let errors = [];
            if(!document.getElementById('f-name').value) errors.push("חסר שם מלא");
            if(pass !== confirm) errors.push("הסיסמאות לא זהות");
            if(pass.length < 5) errors.push("סיסמה חלשה מדי");
            if(!terms) errors.push("חובה לאשר תנאי שימוש");

            if(errors.length > 0) {
                errBox.innerText = "שגיאה: " + errors.join(" | ");
                errBox.classList.remove('hidden');
                return;
            }

            const userData = {
                idKey: currentId,
                name: document.getElementById('f-name').value,
                role: selectedRole,
                status: selectedRole === 'customer' ? 'approved' : 'pending',
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            };

            await db.collection("users").add(userData);
            alert(selectedRole === 'customer' ? "נרשמת בהצלחה!" : "הבקשה הועברה לאישור אדמין. ניצור קשר בקרוב.");
            location.reload();
        }
    </script>
</body>
</html>
