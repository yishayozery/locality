<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Locality - Full Specification v26.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700;800&display=swap');
        body { font-family: 'Assistant', sans-serif; background: #f8fafc; color: #1e293b; direction: rtl; }
        .page { display: none; min-height: 100vh; flex-direction: column; }
        .page.active { display: flex; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .form-card { background: white; padding: 2.5rem; border-radius: 3rem; shadow: 0 25px 50px -12px rgba(0,0,0,0.1); width: 100%; max-width: 700px; }
        label { display: block; font-size: 12px; font-weight: 800; color: #475569; margin-bottom: 4px; margin-right: 4px; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 14px; outline: none; transition: 0.2s; background: #fff; }
        input:focus { border-color: #4f46e5; ring: 3px rgba(79, 70, 229, 0.1); }
        .role-btn { cursor: pointer; border: 2px solid transparent; transition: 0.3s; padding: 1.5rem; border-radius: 2rem; background: #f1f5f9; text-align: center; }
        .role-btn.selected { border-color: #4f46e5; background: #eef2ff; transform: scale(1.05); }
        .strength-text { font-size: 10px; font-weight: 700; margin-top: 4px; }
        .eye-icon { position: absolute; left: 12px; top: 38px; cursor: pointer; color: #94a3b8; }
        .error-summary { background: #fef2f2; border: 1px solid #fee2e2; color: #b91c1c; padding: 1rem; border-radius: 1rem; font-size: 12px; font-weight: 700; display: none; }
    </style>
</head>
<body>

    <div id="page-auth" class="page active items-center justify-center p-4 py-12">
        <div class="form-card relative">
            <h1 class="text-5xl font-black text-indigo-900 text-center mb-8 italic">LOCALITY</h1>

            <div id="step-id" class="space-y-6">
                <div class="space-y-4">
                    <label>חיבור לפי נייד או אימייל</label>
                    <input id="auth-input" type="text" placeholder="05XXXXXXXX / email@domain.com" class="text-center font-bold text-lg">
                </div>
                
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="loginSocial('google')" class="flex items-center justify-center gap-2 border p-3 rounded-2xl hover:bg-slate-50 transition text-xs font-bold">
                        <img src="https://www.google.com/favicon.ico" class="w-4 h-4"> Google
                    </button>
                    <button onclick="loginSocial('facebook')" class="flex items-center justify-center gap-2 border p-3 rounded-2xl hover:bg-slate-50 transition text-xs font-bold text-blue-600">
                        f Facebook
                    </button>
                </div>

                <button onclick="identifyUser()" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-black shadow-lg hover:bg-indigo-700 transition">המשך</button>
            </div>

            <div id="step-role" class="hidden space-y-6 text-center">
                <div class="bg-indigo-50 p-6 rounded-2xl border border-indigo-100">
                    <p class="text-indigo-900 font-bold text-lg">שלום, אנחנו לא מכירים!</p>
                    <p class="text-indigo-700 text-sm italic">מעבירים אותך לרישום מהיר במערכת</p>
                </div>
                <div class="grid grid-cols-3 gap-3">
                    <div onclick="selectRole('customer')" id="r-customer" class="role-btn">🛒<br><span class="text-[10px] font-bold">לקוח</span></div>
                    <div onclick="selectRole('vendor')" id="r-vendor" class="role-btn">🏭<br><span class="text-[10px] font-bold">ספק</span></div>
                    <div onclick="selectRole('hub')" id="r-hub" class="role-btn">📍<br><span class="text-[10px] font-bold">חנות</span></div>
                </div>
                <button onclick="openRegisterForm()" id="btn-next-role" class="w-full bg-slate-200 text-slate-400 py-4 rounded-2xl font-black" disabled>המשך לפרטים</button>
            </div>

            <div id="step-details" class="hidden space-y-6 text-right overflow-y-auto max-h-[70vh] px-4">
                <div id="fields-grid" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    </div>
                
                <div class="border-t pt-6 space-y-4">
                    <div class="grid grid-cols-2 gap-4">
                        <div class="relative">
                            <label>סיסמה</label>
                            <input id="pass1" type="password" oninput="checkPassStrength(this.value)">
                            <span onclick="toggleView('pass1')" class="eye-icon">👁️</span>
                            <div id="pass-hint" class="strength-text text-slate-400">מינימום 6 תווים, אות גדולה ומספר</div>
                        </div>
                        <div class="relative">
                            <label>אימות סיסמה</label>
                            <input id="pass2" type="password">
                            <span onclick="toggleView('pass2')" class="eye-icon">👁️</span>
                        </div>
                    </div>
                    
                    <div class="flex items-center gap-3 py-4 bg-slate-50 p-4 rounded-2xl">
                        <input type="checkbox" id="terms" class="w-6 h-6 accent-indigo-600">
                        <label for="terms" class="text-[11px] text-slate-600 leading-tight">אני מאשר את <button type="button" class="text-indigo-600 underline font-bold">תנאי השימוש</button> לאחר שקראתי אותם</label>
                    </div>
                </div>

                <div id="error-summary" class="error-summary"></div>
                <button onclick="registerFinal()" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-black shadow-xl">סיום והגשת בקשה</button>
            </div>
        </div>
    </div>

    <script>
        // --- FIREBASE SETUP ---
        const firebaseConfig = {
            apiKey: "AIzaSyCKqnuCr2ejDPU74KDzw9LZQAk830KF78Q",
            authDomain: "locality-2a821.firebaseapp.com",
            projectId: "locality-2a821",
            storageBucket: "locality-2a821.firebasestorage.app",
            messagingSenderId: "1030549590558",
            appId: "1:1030549590558:web:b7876d795de5aa60a1140f"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        let currentId = '';
        let role = '';

        function toggleView(id) {
            const el = document.getElementById(id);
            el.type = el.type === 'password' ? 'text' : 'password';
        }

        function checkPassStrength(p) {
            const hint = document.getElementById('pass-hint');
            let checks = [];
            if(p.length < 6) checks.push("6 תווים");
            if(!/[A-Z]/.test(p)) checks.push("אות גדולה");
            if(!/[0-9]/.test(p)) checks.push("מספר");
            
            if(checks.length === 0) {
                hint.innerText = "סיסמה חזקה!";
                hint.className = "strength-text text-emerald-500";
            } else {
                hint.innerText = "חסר: " + checks.join(", ");
                hint.className = "strength-text text-orange-500";
            }
        }

        async function identifyUser() {
            currentId = document.getElementById('auth-input').value;
            if(!currentId) return;
            const snap = await db.collection("users").where("idKey", "==", currentId).get();
            document.getElementById('step-id').classList.add('hidden');
            if(snap.empty) document.getElementById('step-role').classList.remove('hidden');
            else alert("משתמש קיים - עובר למסך סיסמה");
        }

        function selectRole(r) {
            role = r;
            document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('selected'));
            document.getElementById(`r-${r}`).classList.add('selected');
            const btn = document.getElementById('btn-next-role');
            btn.className = "w-full bg-indigo-600 text-white py-4 rounded-2xl font-black shadow-lg";
            btn.disabled = false;
        }

        function openRegisterForm() {
            document.getElementById('step-role').classList.add('hidden');
            document.getElementById('step-details').classList.remove('hidden');
            const grid = document.getElementById('fields-grid');
            
            let html = `
                <div class="col-span-full font-black text-indigo-900 border-b pb-2 uppercase italic italic">פרטי ${role}</div>
                <div><label>שם מלא (חובה)</label><input id="f-name" required></div>
                <div><label>אימייל</label><input id="f-email" value="${currentId.includes('@')?currentId:''}"></div>
                <div><label>נייד</label><input id="f-phone" value="${!currentId.includes('@')?currentId:''}"></div>
            `;

            if(role === 'customer') {
                html += `<div><label>נייד נוסף (זמינות)</label><input id="f-phone2"></div>
                         <div class="col-span-full"><label>כתובת מלאה (חובה לאספקה)</label><input id="f-addr" required></div>`;
            } else if(role === 'vendor') {
                html += `<div><label>שם העסק</label><input id="v-biz"></div>
                         <div><label>כתובת</label><input id="v-addr"></div>
                         <div class="col-span-full grid grid-cols-2 md:grid-cols-4 gap-2 bg-slate-50 p-4 rounded-2xl">
                             <div class="col-span-full text-[10px] font-black opacity-40 uppercase">פרטי בנק</div>
                             <input id="v-bank-o" placeholder="בעל חשבון"><input id="v-bank-n" placeholder="בנק"><input id="v-bank-s" placeholder="סניף"><input id="v-bank-a" placeholder="חשבון">
                         </div>
                         <div><label>סוג הפצה</label><select id="v-dist"><option>איסוף ממני</option><option>מביא לנקודות</option></select></div>
                         <div><label>קטגוריות</label><input id="v-cat"></div>`;
            } else if(role === 'hub') {
                html += `<div><label>שם הנקודה</label><input id="h-point"></div>
                         <div><label>כתובת גוגל</label><input id="h-addr"></div>
                         <div><label>אזור שייכות</label><input id="h-zone"></div>
                         <div><label>לוגיסטיקה</label><select id="h-log"><option>יכול לאסוף</option><option>רק הגעה</option></select></div>`;
            }
            grid.innerHTML = html;
        }

        async function registerFinal() {
            const err = document.getElementById('error-summary');
            const p1 = document.getElementById('pass1').value;
            const p2 = document.getElementById('pass2').value;
            const t = document.getElementById('terms').checked;
            
            let list = [];
            if(!document.getElementById('f-name').value) list.push("שם מלא חסר");
            if(role === 'customer' && !document.getElementById('f-addr').value) list.push("כתובת חסרה");
            if(p1 !== p2) list.push("הסיסמאות לא תואמות");
            if(p1.length < 6) list.push("סיסמה קצרה מדי");
            if(!t) list.push("חובה לאשר תנאים");

            if(list.length > 0) {
                err.innerHTML = list.join(" | ");
                err.style.display = 'block';
                return;
            }

            const data = { idKey: currentId, name: document.getElementById('f-name').value, role: role, status: role === 'customer' ? 'approved' : 'pending' };
            await db.collection("users").add(data);
            alert(role === 'customer' ? "נרשמת!" : "ממתין לאישור אדמין");
            location.reload();
        }

        async function loginSocial(p) {
            const prov = p === 'google' ? new firebase.auth.GoogleAuthProvider() : new firebase.auth.FacebookAuthProvider();
            const res = await auth.signInWithPopup(prov);
            document.getElementById('auth-input').value = res.user.email;
            identifyUser();
        }
    </script>
</body>
</html>
