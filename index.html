<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOCALITY | Complete System v46.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@200;400;600;700;800&display=swap');
        body { font-family: 'Assistant', sans-serif; background: #fdfdfd; color: #1e1b4b; min-height: 100vh; overflow-x: hidden; }
        .glass-card { background: white; border-radius: 3rem; box-shadow: 0 40px 100px -20px rgba(0,0,0,0.08); border: 1px solid #f1f5f9; }
        .input-main { width: 100%; padding: 1.1rem; background: #f8fafc; border: 2px solid #f1f5f9; border-radius: 1.2rem; outline: none; transition: 0.3s; font-weight: 700; text-align: center; }
        .input-main:focus { border-color: #1e1b4b; background: white; }
        .btn-entry { width: 100%; padding: 1.1rem; border-radius: 1.2rem; font-weight: 800; font-size: 1.2rem; transition: 0.3s; margin-top: 0.5rem; }
        .btn-active { background: #1e1b4b; color: #fff; cursor: pointer; box-shadow: 0 10px 20px rgba(30,27,75,0.2); }
        .btn-inactive { background: #f1f5f9; color: #cbd5e1; cursor: not-allowed; }
        .dashboard-view { display: none; padding-top: 7rem; width: 100%; max-width: 1200px; margin: 0 auto; px: 1.5rem; }
        .dashboard-view.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .toast-sys { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%); background: #1e1b4b; color: white; padding: 1rem 2rem; border-radius: 1rem; z-index: 9999; display: none; font-weight: 700; }
        .admin-layer { display: none; position: fixed; inset: 0; background: #f8fafc; z-index: 8000; overflow-y: auto; padding: 2rem; }
        .admin-layer.active { display: block; }
    </style>
</head>
<body class="antialiased">

    <nav class="fixed top-0 inset-x-0 h-20 bg-white/90 backdrop-blur-md z-[1000] px-8 flex justify-between items-center border-b border-slate-50">
        <div onclick="location.reload()" class="text-3xl font-black italic cursor-pointer tracking-tighter">LOCALITY</div>
        <div class="flex gap-4">
            <button id="nav-logout" onclick="logout()" class="hidden text-xs font-black text-red-500 uppercase border border-red-100 px-4 py-1 rounded-full">התנתקות</button>
            <button onclick="accessAdmin()" class="text-[9px] font-black text-slate-300 border border-slate-100 px-3 py-1 rounded-full uppercase">Admin Control</button>
        </div>
    </nav>

    <main id="auth-section" class="flex-grow pt-24 pb-6 px-4 flex items-center justify-center">
        <div id="auth-box" class="glass-card w-full max-w-xl p-10">
            <div id="step-id" class="space-y-6">
                <div class="text-center space-y-1">
                    <h2 class="text-2xl font-black italic tracking-tighter">LOCALITY</h2>
                    <p class="text-indigo-600 font-bold text-sm">מחברים אותך ישירות לקהילה וליצרן</p>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="loginSocial('google')" class="flex items-center justify-center gap-2 py-3 border rounded-2xl font-bold text-xs hover:bg-slate-50 transition"><img src="https://www.google.com/favicon.ico" class="w-4 h-4"> Google</button>
                    <button onclick="loginSocial('facebook')" class="flex items-center justify-center gap-2 py-3 border rounded-2xl font-bold text-blue-700 hover:bg-slate-50 transition">Facebook</button>
                </div>
                <div class="relative flex items-center py-1">
                    <div class="flex-grow border-t border-slate-100"></div>
                    <span class="mx-3 text-[9px] font-black text-slate-300 uppercase">או זיהוי ידני</span>
                    <div class="flex-grow border-t border-slate-100"></div>
                </div>
                <input id="login-input" type="text" placeholder="הקש נייד או מייל להתחברות" oninput="validateInput(this.value)" class="input-main">
                <button id="btn-submit" disabled onclick="handleIdentify()" class="btn-entry btn-inactive">כניסה</button>
            </div>

            <div id="step-password" class="hidden space-y-6 text-center">
                <h3 id="welcome-msg" class="text-2xl font-black text-indigo-950 italic"></h3>
                <input id="login-pass" type="password" placeholder="הזן סיסמה" class="input-main">
                <button onclick="loginUser()" class="btn-entry btn-active shadow-xl">כניסה למערכת</button>
            </div>

            <div id="step-role" class="hidden space-y-8 text-center">
                <div class="bg-indigo-50 p-6 rounded-[2.5rem] border border-indigo-100">
                    <h3 class="text-xl font-black text-indigo-950">שלום, אנחנו לא מכירים!</h3>
                    <p class="text-indigo-600 text-[10px] font-bold mt-1 uppercase tracking-widest">רישום מהיר במערכת</p>
                </div>
                <div class="grid grid-cols-3 gap-3">
                    <div onclick="startRegister('לקוח')" class="p-4 bg-slate-50 rounded-3xl cursor-pointer hover:bg-white border-2 border-transparent hover:border-indigo-600 transition">🛒<br><span class="text-[9px] font-bold">לקוח</span></div>
                    <div onclick="startRegister('ספק')" class="p-4 bg-slate-50 rounded-3xl cursor-pointer hover:bg-white border-2 border-transparent hover:border-indigo-600 transition">🏭<br><span class="text-[9px] font-bold">ספק</span></div>
                    <div onclick="startRegister('חנות')" class="p-4 bg-slate-50 rounded-3xl cursor-pointer hover:bg-white border-2 border-transparent hover:border-indigo-600 transition">📍<br><span class="text-[9px] font-bold">חנות</span></div>
                </div>
            </div>

            <div id="step-form" class="hidden space-y-4 text-right">
                <div id="dynamic-fields" class="grid grid-cols-1 md:grid-cols-2 gap-3"></div>
                <div class="border-t pt-4 space-y-4">
                    <div class="grid grid-cols-2 gap-3">
                        <input id="reg-p1" type="password" placeholder="בחר סיסמה" class="input-main py-3 text-sm">
                        <input id="reg-p2" type="password" placeholder="אימות סיסמה" class="input-main py-3 text-sm">
                    </div>
                    <div class="flex items-center gap-3 bg-slate-50 p-4 rounded-2xl">
                        <input type="checkbox" id="terms-v" class="w-6 h-6 accent-indigo-600 rounded-lg">
                        <label class="text-[10px] font-bold text-slate-500 italic leading-tight">אני מאשר את תנאי השימוש של LOCALITY</label>
                    </div>
                </div>
                <button onclick="submitFinal()" id="reg-btn-text" class="btn-entry btn-active shadow-xl">סיום והמשך</button>
            </div>
        </div>
    </main>

    <section id="dash-customer" class="dashboard-view px-6">
        <div class="flex justify-between items-center mb-10 border-b pb-6">
            <h1 class="text-4xl font-black text-indigo-950 italic">החנות שלי</h1>
            <p id="hub-location" class="bg-indigo-50 px-5 py-2 rounded-full text-indigo-600 font-bold text-sm">מאתר נקודה...</p>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 italic text-slate-300 h-64">
            <div class="bg-white p-12 rounded-[3rem] border border-dashed flex items-center justify-center">המוצרים יופיעו כאן...</div>
            <div class="bg-white p-12 rounded-[3rem] border border-dashed flex items-center justify-center">מבצעי השבוע...</div>
        </div>
    </section>

    <div id="admin-panel" class="admin-layer">
        <div class="max-w-6xl mx-auto w-full">
            <div class="flex justify-between items-center mb-10 border-b pb-6">
                <h1 class="text-4xl font-black italic">Admin Hub</h1>
                <button onclick="location.reload()" class="bg-indigo-950 text-white px-8 py-2 rounded-full font-bold">יציאה מהניהול</button>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div class="bg-white p-8 rounded-[3rem] shadow-sm border border-slate-100">
                    <h3 class="font-black mb-6 border-b pb-2">בקשות לאישור (Pending)</h3>
                    <div id="admin-pending-list" class="space-y-4"></div>
                </div>
                <div class="bg-white p-8 rounded-[3rem] shadow-sm border border-slate-100 space-y-4">
                    <h3 class="font-black mb-2 border-b pb-2 text-indigo-600">עריכת תנאי שימוש</h3>
                    <textarea id="edit-terms-customer" placeholder="נוסח לקוח" class="input-main h-24 text-right text-xs py-2"></textarea>
                    <textarea id="edit-terms-vendor" placeholder="נוסח ספק" class="input-main h-24 text-right text-xs py-2"></textarea>
                    <button onclick="saveAdminTerms()" class="bg-indigo-600 text-white px-6 py-2 rounded-xl font-bold text-xs">עדכן ב-Database</button>
                </div>
            </div>
        </div>
    </div>

    <div id="sys-toast" class="toast-sys"></div>

    <script>
        // --- FIREBASE ---
        const firebaseConfig = {
            apiKey: "AIzaSyCKqnuCr2ejDPU74KDzw9LZQAk830KF78Q",
            authDomain: "locality-2a821.firebaseapp.com",
            projectId: "locality-2a821",
            storageBucket: "locality-2a821.firebasestorage.app",
            messagingSenderId: "1030549590558",
            appId: "1:1030549590558:web:b7876d795de5aa60a1140f"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let currentId = '';
        let role = '';
        let existingUser = null;

        function showToast(msg) {
            const t = document.getElementById('sys-toast');
            t.innerText = msg; t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 3500);
        }

        function validateInput(val) {
            const btn = document.getElementById('btn-submit');
            const ok = /^\d{10}$/.test(val) || /\S+@\S+\.\S+/.test(val);
            btn.disabled = !ok;
            btn.classList.toggle('btn-active', ok);
            btn.classList.toggle('btn-inactive', !ok);
        }

        async function handleIdentify() {
            currentId = document.getElementById('login-input').value;
            const snap = await db.collection("users").where("idKey", "==", currentId).get();
            document.getElementById('step-id').classList.add('hidden');
            if (snap.empty) {
                document.getElementById('step-role').classList.remove('hidden');
            } else {
                existingUser = snap.docs[0].data();
                document.getElementById('welcome-msg').innerText = `איזה כיף שחזרת, ${existingUser.name.split(' ')[0]}!`;
                document.getElementById('step-password').classList.remove('hidden');
            }
        }

        function startRegister(r) {
            role = r;
            document.getElementById('step-role').classList.add('hidden');
            document.getElementById('step-form').classList.remove('hidden');
            const cont = document.getElementById('dynamic-fields');
            const btn = document.getElementById('reg-btn-text');
            
            let common = `<input id="f-name" placeholder="שם מלא (חובה)" class="input-main py-3 text-sm">
                          <input id="f-email" placeholder="אימייל" class="input-main py-3 text-sm" value="${currentId.includes('@')?currentId:''}">
                          <input id="f-phone" placeholder="נייד" class="input-main py-3 text-sm" value="${!currentId.includes('@')?currentId:''}">`;

            if(role === 'לקוח') {
                cont.innerHTML = common + `<input id="f-phone2" placeholder="נייד נוסף" class="input-main py-3 text-sm">
                                            <input id="f-addr" placeholder="כתובת מגורים מלאה" class="input-main py-3 text-sm col-span-full">`;
                btn.innerText = "העברה לנקודת איסוף הקרובה אליך";
            } else if(role === 'ספק') {
                cont.innerHTML = common + `
                    <input id="v-biz" placeholder="שם העסק" class="input-main py-3 text-sm">
                    <input id="v-tax" placeholder="ח.פ / עוסק" class="input-main py-3 text-sm">
                    <div class="col-span-full grid grid-cols-4 gap-1">
                        <input id="v-b1" placeholder="בנק" class="text-[9px] p-2 border rounded-xl"><input id="v-b2" placeholder="סניף" class="text-[9px] p-2 border rounded-xl">
                        <input id="v-b3" placeholder="חן" class="text-[9px] p-2 border rounded-lg"><input id="v-b4" placeholder="בעלים" class="text-[9px] p-2 border rounded-lg">
                    </div>`;
                btn.innerText = "סיום רישום ספק";
            } else {
                cont.innerHTML = common + `<input id="h-point" placeholder="שם הנקודה" class="input-main py-3 text-sm col-span-full">
                                            <input id="h-addr" placeholder="כתובת מלאה" class="input-main py-3 text-sm col-span-full">`;
                btn.innerText = "סיום רישום חנות";
            }
        }

        async function loginUser() {
            if (document.getElementById('login-pass').value === existingUser.password) {
                if(existingUser.status === 'pending') return showToast("החשבון ממתין לאישור אדמין.");
                enterDashboard(existingUser);
            } else { showToast("סיסמה שגויה."); }
        }

        async function submitFinal() {
            if(document.getElementById('reg-p1').value !== document.getElementById('reg-p2').value) return showToast("הסיסמאות אינן תואמות.");
            if(!document.getElementById('terms-v').checked) return showToast("חובה לאשר תנאים.");
            
            const data = { 
                idKey: currentId, name: document.getElementById('f-name').value, 
                role: role, password: document.getElementById('reg-p1').value, 
                status: role === 'לקוח' ? 'approved' : 'pending',
                address: document.getElementById('f-addr')?.value || document.getElementById('h-addr')?.value || 'השכונה'
            };
            await db.collection("users").add(data);
            if(role === 'לקוח') enterDashboard(data);
            else { showToast("הבקשה הועברה לאישור אדמין."); location.reload(); }
        }

        function enterDashboard(user) {
            document.getElementById('auth-section').classList.add('hidden');
            document.getElementById('nav-logout').classList.remove('hidden');
            if(user.role === 'לקוח') {
                document.getElementById('dash-customer').classList.add('active');
                document.getElementById('hub-location').innerText = `חנות ${user.address.split(' ')[0]}`;
            }
        }

        function accessAdmin() { if(prompt("Admin Access:") === "1234") { document.getElementById('admin-panel').classList.add('active'); loadAdminData(); } }
        async function loadAdminData() {
            const snap = await db.collection("users").where("status", "==", "pending").get();
            document.getElementById('admin-pending-list').innerHTML = snap.docs.map(doc => `
                <div class="flex justify-between items-center bg-slate-50 p-4 rounded-2xl">
                    <span class="text-xs font-bold">${doc.data().name} (${doc.data().role})</span>
                    <button onclick="approve('${doc.id}')" class="bg-emerald-500 text-white px-3 py-1 rounded-lg text-[10px]">אשר</button>
                </div>`).join('');
        }
        async function approve(id) { await db.collection("users").doc(id).update({status:'approved'}); loadAdminData(); }
        function saveAdminTerms() { showToast("התנאים עודכנו ב-Firebase."); }
        function logout() { location.reload(); }
    </script>
</body>
</html>
