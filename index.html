<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOCALITY | Smart Logistics Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@200;400;600;700;800&display=swap');
        
        body { font-family: 'Assistant', sans-serif; background: #ffffff; color: #1e1b4b; min-height: 100vh; display: flex; flex-direction: column; overflow-x: hidden; }
        
        /* Brand Elements */
        .logo-brand { font-size: 2.2rem; font-weight: 900; letter-spacing: -2px; cursor: pointer; color: #1e1b4b; transition: 0.3s; }
        .logo-brand:hover { opacity: 0.8; }
        
        /* Auth Card & Inputs */
        .auth-card { background: white; border-radius: 3.5rem; box-shadow: 0 40px 100px -20px rgba(0,0,0,0.06); border: 1px solid #f1f5f9; width: 100%; max-width: 480px; padding: 2.5rem; }
        .input-main { width: 100%; padding: 1rem; background: #f8fafc; border: 2px solid #f1f5f9; border-radius: 1.2rem; outline: none; transition: 0.3s; font-weight: 700; text-align: center; font-size: 1.1rem; }
        .input-main:focus { border-color: #1e1b4b; background: white; }

        /* Buttons */
        .btn-entry { @apply w-full py-4 rounded-2xl font-black text-xl transition-all duration-300 mt-3; }
        .btn-active { background: #1e1b4b; color: white; cursor: pointer; shadow-lg shadow-indigo-100; }
        .btn-inactive { background: #f1f5f9; color: #cbd5e1; cursor: not-allowed; }

        .social-btn { @apply flex items-center justify-center gap-3 w-full py-3.5 border border-slate-100 rounded-2xl font-bold text-xs transition-all hover:bg-slate-50; }
        
        /* Roles */
        .role-card { @apply p-5 bg-slate-50 border-2 border-transparent rounded-[2rem] cursor-pointer transition-all hover:border-indigo-600 hover:bg-white text-center; }
        
        /* Vision & Global Footer */
        .footer-vision { @apply mt-auto py-10 text-center border-t border-slate-50; }
        .vision-tagline { font-size: 0.7rem; font-weight: 700; color: #94a3b8; text-transform: uppercase; letter-spacing: 1.5px; }

        /* Forms Layout */
        .form-grid { @apply grid grid-cols-1 md:grid-cols-2 gap-3; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body class="antialiased">

    <nav class="fixed top-0 inset-x-0 h-20 bg-white/90 backdrop-blur-md z-[1000] px-8 flex justify-between items-center border-b border-slate-50">
        <div onclick="location.reload()" class="logo-brand">LOCALITY</div>
        <button onclick="openModal('modal-contact')" class="text-sm font-extrabold text-indigo-600 border-b-2 border-indigo-50 hover:border-indigo-600 transition">צור קשר</button>
    </nav>

    <main class="flex-grow pt-28 pb-10 px-4 flex items-center justify-center">
        
        <div id="auth-panel" class="auth-card">
            
            <div id="step-id" class="space-y-8">
                <div class="text-center">
                    <h2 class="text-2xl font-black tracking-tighter">כניסה</h2>
                </div>

                <div class="grid grid-cols-1 gap-3">
                    <button onclick="loginSocial('google')" class="social-btn">
                        <img src="https://www.google.com/favicon.ico" class="w-4 h-4"> המשך עם Google
                    </button>
                    <button onclick="loginSocial('facebook')" class="social-btn text-blue-700">
                        <span class="font-black text-lg">f</span> המשך עם Facebook
                    </button>
                </div>

                <div class="relative flex items-center py-2">
                    <div class="flex-grow border-t border-slate-100"></div>
                    <span class="mx-4 text-[10px] font-black text-slate-300 uppercase tracking-widest">או זיהוי ידני</span>
                    <div class="flex-grow border-t border-slate-100"></div>
                </div>

                <div>
                    <input id="login-input" type="text" 
                           placeholder="הקש נייד או מייל להתחברות" 
                           oninput="validateInput(this.value)"
                           class="input-main">
                    
                    <button id="btn-submit" disabled onclick="handleIdentify()" class="btn-entry btn-inactive">כניסה</button>
                </div>
            </div>

            <div id="step-role" class="hidden space-y-10 text-center">
                <div class="bg-indigo-50 p-8 rounded-[2.5rem] border border-indigo-100">
                    <h3 class="text-xl font-black text-indigo-900 italic">שלום, אנחנו לא מכירים!</h3>
                    <p class="text-indigo-600 text-[10px] font-bold mt-1">רישום מהיר למערכת</p>
                </div>
                <div class="grid grid-cols-3 gap-3">
                    <div onclick="startRegister('לקוח')" class="role-card">
                        <span class="text-4xl block mb-2">🛒</span><span class="text-[9px] font-black uppercase">לקוח</span>
                    </div>
                    <div onclick="startRegister('ספק')" class="role-card">
                        <span class="text-4xl block mb-2">🏭</span><span class="text-[9px] font-black uppercase">ספק</span>
                    </div>
                    <div onclick="startRegister('חנות')" class="role-card">
                        <span class="text-4xl block mb-2">📍</span><span class="text-[9px] font-black uppercase">חנות</span>
                    </div>
                </div>
                <button onclick="location.reload()" class="text-xs text-slate-400 font-bold underline">חזרה</button>
            </div>

            <div id="step-form" class="hidden space-y-6 text-right">
                <div id="dynamic-fields" class="form-grid"></div>
                
                <div class="border-t pt-4 space-y-4">
                    <div class="grid grid-cols-2 gap-3">
                        <input id="p1" type="password" placeholder="בחר סיסמה" class="input-main text-sm py-3">
                        <input id="p2" type="password" placeholder="אימות סיסמה" class="input-main text-sm py-3">
                    </div>
                    <div class="flex items-center gap-3 bg-slate-50 p-4 rounded-2xl">
                        <input type="checkbox" id="terms-v" class="w-6 h-6 accent-indigo-600 rounded-lg">
                        <label class="text-[10px] font-bold text-slate-500 leading-tight">אני מאשר את תנאי השימוש של LOCALITY</label>
                    </div>
                </div>
                <button id="main-reg-btn" onclick="submitFinal()" class="btn-entry btn-active shadow-xl">סיום והעבר אותי להמשך</button>
            </div>

            <div id="step-success" class="hidden space-y-8 text-center py-6">
                <div class="text-6xl">🛰️</div>
                <h2 class="text-3xl font-black text-indigo-950">החיבור הושלם!</h2>
                <div class="p-8 bg-indigo-50 rounded-[2.5rem] border border-indigo-100">
                    <p class="text-[10px] font-black text-indigo-400 uppercase tracking-widest mb-2">נקודת האיסוף שלך</p>
                    <p id="hub-display-name" class="text-2xl font-black text-indigo-900 italic italic">מאתר חנות קרובה...</p>
                </div>
                <button onclick="location.reload()" class="btn-entry btn-active shadow-2xl">כניסה לחנות שלי</button>
            </div>

        </div>
    </main>

    <footer class="footer-vision">
        <p class="vision-tagline">LOCALITY - מחברים בין אנשים, יצרנים וקהילות בדרך קצרה, חכמה וישירה</p>
    </footer>

    <div id="modal-contact" class="fixed inset-0 z-[2000] bg-slate-900/60 backdrop-blur-sm hidden items-center justify-center p-6 text-right">
        <div class="bg-white p-10 rounded-[3rem] w-full max-w-lg shadow-2xl">
            <h2 class="text-2xl font-black text-indigo-950 mb-6 italic italic">צור קשר</h2>
            <div class="space-y-4">
                <input id="c-name" placeholder="שם מלא" class="input-main text-right text-base py-3">
                <input id="c-phone" placeholder="מספר נייד" class="input-main text-right text-base py-3">
                <textarea id="c-msg" placeholder="מה תרצה לספר לנו?" class="input-main text-right text-base h-32 py-4"></textarea>
                <div class="flex gap-4">
                    <button onclick="closeModal('modal-contact')" class="flex-1 font-bold text-slate-400">ביטול</button>
                    <button onclick="alert('הפנייה נשלחה למנהל השירות ותענה בהקדם.'); closeModal('modal-contact');" class="flex-[2] btn-entry btn-active text-base py-3 mt-0">שלח פנייה</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- FIREBASE CONFIG ---
        const firebaseConfig = {
            apiKey: "AIzaSyCKqnuCr2ejDPU74KDzw9LZQAk830KF78Q",
            authDomain: "locality-2a821.firebaseapp.com",
            projectId: "locality-2a821",
            storageBucket: "locality-2a821.firebasestorage.app",
            messagingSenderId: "1030549590558",
            appId: "1:1030549590558:web:b7876d795de5aa60a1140f"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let currentId = '';
        let role = '';

        function validateInput(val) {
            const btn = document.getElementById('btn-submit');
            const isPhone = /^\d{10}$/.test(val);
            const isEmail = /\S+@\S+\.\S+/.test(val);
            if(isPhone || isEmail) {
                btn.disabled = false;
                btn.classList.replace('btn-inactive', 'btn-active');
            } else {
                btn.disabled = true;
                btn.classList.replace('btn-active', 'btn-inactive');
            }
        }

        async function loginSocial(type) {
            const provider = type === 'google' ? new firebase.auth.GoogleAuthProvider() : new firebase.auth.FacebookAuthProvider();
            try {
                const res = await firebase.auth().signInWithPopup(provider);
                document.getElementById('login-input').value = res.user.email;
                validateInput(res.user.email);
                handleIdentify();
            } catch(e) { alert("שגיאה בהתחברות חברתית. וודא הגדרות פייסבוק/גוגל ב-Firebase Console."); }
        }

        function handleIdentify() {
            currentId = document.getElementById('login-input').value;
            document.getElementById('step-id').classList.add('hidden');
            document.getElementById('step-role').classList.remove('hidden');
        }

        function startRegister(r) {
            role = r;
            document.getElementById('step-role').classList.add('hidden');
            document.getElementById('step-form').classList.remove('hidden');
            const container = document.getElementById('dynamic-fields');
            const mainBtn = document.getElementById('main-reg-btn');
            
            let common = `<input id="f-name" placeholder="שם מלא (חובה)" class="input-main text-right text-sm py-3">
                          <input id="f-email" placeholder="אימייל" class="input-main text-right text-sm py-3" value="${currentId.includes('@')?currentId:''}">
                          <input id="f-phone" placeholder="נייד" class="input-main text-right text-sm py-3" value="${!currentId.includes('@')?currentId:''}">`;

            if(role === 'לקוח') {
                container.innerHTML = common + `<input id="f-phone2" placeholder="נייד נוסף" class="input-main text-right text-sm py-3">
                                                <input id="f-addr" placeholder="כתובת מגורים מלאה" class="input-main text-right text-sm py-3 col-span-full">`;
                mainBtn.innerText = "העבר אותי לנקודת האיסוף שלי";
            } else if(role === 'ספק') {
                container.innerHTML = common + `<input id="v-biz" placeholder="שם העסק" class="input-main text-right text-sm py-3">
                                                <input id="v-tax" placeholder="ח.פ / עוסק" class="input-main text-right text-sm py-3">
                                                <div class="col-span-full grid grid-cols-4 gap-1 mt-1">
                                                    <input id="v-b1" placeholder="בעל ח-ן" class="text-[9px] p-2 border rounded-xl"><input id="v-b2" placeholder="בנק" class="text-[9px] p-2 border rounded-xl"><input id="v-b3" placeholder="סניף" class="text-[9px] p-2 border rounded-xl"><input id="v-b4" placeholder="ח-ן" class="text-[9px] p-2 border rounded-xl">
                                                </div>`;
                mainBtn.innerText = "שלח בקשת ספק לאישור";
            } else if(role === 'חנות') {
                container.innerHTML = common + `<input id="h-point" placeholder="שם הנקודה" class="input-main text-right text-sm py-3 col-span-full">
                                                <input id="h-addr" placeholder="כתובת מאומתת" class="input-main text-right text-sm py-3 col-span-full">`;
                mainBtn.innerText = "שלח בקשת חנות לאישור";
            }
        }

        async function submitFinal() {
            if(document.getElementById('p1').value !== document.getElementById('p2').value) return alert("הסיסמאות לא תואמות");
            if(!document.getElementById('terms-v').checked) return alert("חובה לאשר תנאים");
            
            const data = { idKey: currentId, name: document.getElementById('f-name').value, role: role, status: role === 'לקוח' ? 'approved' : 'pending', createdAt: new Date() };
            await db.collection("users").add(data);
            
            if(role === 'לקוח') {
                document.getElementById('step-form').classList.add('hidden');
                document.getElementById('step-success').classList.remove('hidden');
                const addr = document.getElementById('f-addr').value;
                document.getElementById('hub-display-name').innerText = "חנות " + (addr.split(' ')[0] || "השכונה");
            } else {
                alert("הבקשה הועברה לאישור אדמין. ניצור קשר בקרוב.");
                location.reload();
            }
        }

        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    </script>
</body>
</html>
