<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Locality - Logistics System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>@import url('https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;700&display=swap'); body { font-family: 'Assistant', sans-serif; }</style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-900">
    <nav class="bg-indigo-900 text-white p-4 shadow-xl sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-black tracking-tighter">LOCALITY <span class="text-indigo-400 font-light text-xs italic uppercase">Pro Logistics</span></h1>
            <button onclick="toggleModal()" class="bg-emerald-500 hover:bg-emerald-400 px-6 py-2 rounded-full font-bold transition-all shadow-lg active:scale-95">+ הוסף נקודה</button>
        </div>
    </nav>
    <main class="container mx-auto p-6">
        <div id="points-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
    </main>
    <div id="modal" class="hidden fixed inset-0 bg-slate-900/90 backdrop-blur-md flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-3xl p-8 max-w-lg w-full shadow-2xl">
            <h2 class="text-2xl font-bold mb-6 text-indigo-900">רישום נקודת איסוף חדשה</h2>
            <div class="grid grid-cols-2 gap-4">
                <input id="nameIn" placeholder="שם העסק" class="col-span-2 p-3 border-b-2 focus:border-indigo-500 outline-none">
                <input id="addrIn" placeholder="כתובת" class="col-span-2 p-3 border-b-2 focus:border-indigo-500 outline-none">
                <input id="phoneIn" placeholder="טלפון" class="p-3 border-b-2 focus:border-indigo-500 outline-none">
                <input id="hoursIn" placeholder="שעות פעילות" class="p-3 border-b-2 focus:border-indigo-500 outline-none">
                <input id="capIn" type="number" placeholder="קיבולת חבילות" class="p-3 border-b-2 focus:border-indigo-500 outline-none">
                <input id="currentIn" type="number" placeholder="חבילות כרגע" class="p-3 border-b-2 focus:border-indigo-500 outline-none">
            </div>
            <div class="flex gap-4 mt-8">
                <button onclick="savePoint()" class="bg-indigo-600 text-white flex-1 py-4 rounded-2xl font-bold hover:bg-indigo-700 transition">שמור נקודה</button>
                <button onclick="toggleModal()" class="bg-slate-100 text-slate-500 px-6 py-4 rounded-2xl font-bold hover:bg-slate-200">ביטול</button>
            </div>
        </div>
    </div>
    <script>
        let pts = JSON.parse(localStorage.getItem('loc_pts')) || [
            { id: 1, name: "הפיצוציה של דני", addr: "אבן גבירול 42, תל אביב", phone: "052-1234567", hours: "08:00-23:00", cap: 100, cur: 45 },
            { id: 2, name: "מרכז קהילתי יפו", addr: "יפו 101, ירושלים", phone: "02-9876543", hours: "09:00-18:00", cap: 50, cur: 42 }
        ];
        function render() {
            const container = document.getElementById('points-container');
            container.innerHTML = pts.map(p => {
                const perc = Math.min(Math.round((p.cur / p.cap) * 100), 100);
                const color = perc > 85 ? 'bg-red-500' : perc > 50 ? 'bg-amber-500' : 'bg-emerald-500';
                return `
                <div class="bg-white rounded-3xl p-6 shadow-sm border border-slate-200 hover:shadow-2xl transition-all duration-300">
                    <div class="flex justify-between items-start mb-4">
                        <h3 class="text-xl font-bold text-slate-800">${p.name}</h3>
                        <span class="text-[10px] font-bold text-indigo-500 bg-indigo-50 px-2 py-1 rounded-full uppercase">${p.hours}</span>
                    </div>
                    <p class="text-slate-500 text-sm mb-4 leading-tight">📍 ${p.addr}</p>
                    <div class="mb-6">
                        <div class="flex justify-between text-[10px] mb-1 font-bold text-slate-400">
                            <span>מלאי: ${p.cur}/${p.cap} חבילות</span>
                            <span>${perc}%</span>
                        </div>
                        <div class="w-full bg-slate-100 h-1.5 rounded-full overflow-hidden">
                            <div class="h-full ${color} transition-all duration-1000" style="width: ${perc}%"></div>
                        </div>
                    </div>
                    <div class="flex items-center justify-between border-t border-slate-50 pt-4">
                        <a href="tel:${p.phone}" class="text-indigo-600 font-bold text-xs flex items-center gap-1 hover:underline">📞 ${p.phone}</a>
                        <button class="bg-slate-900 text-white text-[10px] px-3 py-1.5 rounded-lg font-bold hover:bg-slate-700">פרטים נוספים</button>
                    </div>
                </div>`;
            }).join('');
            localStorage.setItem('loc_pts', JSON.stringify(pts));
        }
        function toggleModal() { document.getElementById('modal').classList.toggle('hidden'); }
        function savePoint() {
            const newPt = {
                id: Date.now(),
                name: document.getElementById('nameIn').value,
                addr: document.getElementById('addrIn').value,
                phone: document.getElementById('phoneIn').value,
                hours: document.getElementById('hoursIn').value,
                cap: parseInt(document.getElementById('capIn').value) || 1,
                cur: parseInt(document.getElementById('currentIn').value) || 0
            };
            if(newPt.name && newPt.addr) {
                pts.push(newPt); render(); toggleModal();
                ['nameIn','addrIn','phoneIn','hoursIn','capIn','currentIn'].forEach(id => document.getElementById(id).value = '');
            } else { alert("חובה למלא שם וכתובת"); }
        }
        render();
    </script>
</body>
</html>
