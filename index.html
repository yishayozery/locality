<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Locality - Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;700;800&display=swap');
        body { font-family: 'Assistant', sans-serif; transition: all 0.3s ease; }
        .page { display: none; }
        .page.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">

    <div id="page-auth" class="page active flex items-center justify-center min-h-screen p-4">
        <div class="bg-white p-8 rounded-[2.5rem] shadow-2xl w-full max-w-md border border-slate-100">
            <div class="text-center mb-8">
                <h1 class="text-4xl font-black text-indigo-900 tracking-tighter">LOCALITY</h1>
                <p class="text-slate-400 text-sm mt-2">ברוכים הבאים למערכת הלוגיסטיקה השיתופית</p>
            </div>
            
            <div id="auth-form" class="space-y-4">
                <input id="auth-email" type="email" placeholder="אימייל" class="w-full p-4 bg-slate-50 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 border-none">
                <input id="auth-pass" type="password" placeholder="סיסמה" class="w-full p-4 bg-slate-50 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 border-none">
                
                <div class="flex gap-2 p-1 bg-slate-100 rounded-2xl">
                    <button onclick="setRole('customer')" id="btn-cust" class="flex-1 py-2 rounded-xl font-bold text-sm transition bg-white shadow-sm text-indigo-600">לקוח קצה</button>
                    <button onclick="setRole('vendor')" id="btn-vend" class="flex-1 py-2 rounded-xl font-bold text-sm transition text-slate-500">ספק/שותף</button>
                </div>

                <button onclick="login()" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold shadow-lg hover:bg-indigo-700 transition-all mt-4">התחברות / הרשמה</button>
            </div>
        </div>
    </div>

    <div id="page-vendor" class="page min-h-screen">
        <nav class="bg-white border-b p-4 flex justify-between items-center sticky top-0 z-50">
            <h2 class="font-bold text-indigo-900">מרכז ספקים - Locality</h2>
            <button onclick="logout()" class="text-xs text-red-500 font-bold">התנתק</button>
        </nav>
        <main class="container mx-auto p-6 space-y-6">
            <div class="bg-indigo-900 rounded-3xl p-6 text-white shadow-xl">
                <h3 class="text-2xl font-bold">שלום, <span id="vendor-name-display">ספק חדש</span>!</h3>
                <p class="text-indigo-200 text-sm">בוא נשלים את הקמת הפרופיל שלך</p>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                    <h4 class="font-bold mb-4 flex items-center gap-2">🏢 פרטי העסק</h4>
                    <div class="space-y-3">
                        <input id="v-biz-name" placeholder="שם העסק / מותג" class="w-full p-3 bg-slate-50 rounded-xl border-none outline-none">
                        <input id="v-biz-cat" placeholder="קטגוריה (למשל: מזון, אלקטרוניקה)" class="w-full p-3 bg-slate-50 rounded-xl border-none outline-none">
                        <button onclick="saveVendorProfile()" class="w-full bg-emerald-500 text-white py-3 rounded-xl font-bold">עדכן פרופיל</button>
                    </div>
                </div>

                <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                    <h4 class="font-bold mb-4 flex items-center gap-2">📦 ניהול מלאי מהיר</h4>
                    <p class="text-xs text-slate-400 mb-4">כאן תוכל להוסיף מוצרים שיוצגו בנקודות האיסוף</p>
                    <button class="w-full border-2 border-dashed border-slate-200 py-8 rounded-xl text-slate-400 font-bold hover:bg-slate-50 transition">+ הוסף מוצר ראשון</button>
                </div>
            </div>
        </main>
    </div>

    <div id="page-customer" class="page min-h-screen">
        <nav class="bg-indigo-900 text-white p-4 flex justify-between items-center shadow-lg">
            <h1 class="text-xl font-black text-emerald-400">LOCALITY</h1>
            <div class="flex items-center gap-3">
                <span class="text-[10px] opacity-70" id="user-welcome"></span>
                <button onclick="logout()" class="bg-white/10 p-2 rounded-lg text-[10px]">התנתק</button>
            </div>
        </nav>
        <div class="p-4 space-y-4">
            <div id="map" class="h-64 w-full rounded-2xl shadow-inner border border-slate-200"></div>
            <div id="cust-content" class="text-center py-10 text-slate-400 italic">המפה בטעינה...</div>
        </div>
    </div>

    <script>
        let currentUser = null;
        let selectedRole = 'customer';

        function setRole(role) {
            selectedRole = role;
            document.getElementById('btn-cust').className = role === 'customer' ? 'flex-1 py-2 rounded-xl font-bold text-sm transition bg-white shadow-sm text-indigo-600' : 'flex-1 py-2 rounded-xl font-bold text-sm transition text-slate-500';
            document.getElementById('btn-vend').className = role === 'vendor' ? 'flex-1 py-2 rounded-xl font-bold text-sm transition bg-white shadow-sm text-indigo-600' : 'flex-1 py-2 rounded-xl font-bold text-sm transition text-slate-500';
        }

        function login() {
            const email = document.getElementById('auth-email').value;
            if(!email) return alert("נא להזין אימייל");
            
            currentUser = { email, role: selectedRole, name: email.split('@')[0] };
            localStorage.setItem('locality_user', JSON.stringify(currentUser));
            showPage();
        }

        function logout() {
            currentUser = null;
            localStorage.removeItem('locality_user');
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('page-auth').classList.add('active');
        }

        function showPage() {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            if(currentUser.role === 'vendor') {
                document.getElementById('page-vendor').classList.add('active');
                document.getElementById('vendor-name-display').innerText = currentUser.name;
            } else {
                document.getElementById('page-customer').classList.add('active');
                document.getElementById('user-welcome').innerText = `שלום, ${currentUser.name}`;
                initMap();
            }
        }

        function saveVendorProfile() {
            const bizName = document.getElementById('v-biz-name').value;
            if(bizName) {
                alert(`העסק "${bizName}" הוקם בהצלחה במערכת!`);
                document.getElementById('vendor-name-display').innerText = bizName;
            }
        }

        function initMap() {
            setTimeout(() => {
                if(window.mapObj) return;
                window.mapObj = L.map('map').setView([32.07, 34.77], 12);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(window.mapObj);
                document.getElementById('cust-content').innerHTML = "📍 בחר נקודת איסוף כדי להתחיל בקניות";
            }, 100);
        }

        // Check if already logged in
        const saved = localStorage.getItem('locality_user');
        if(saved) {
            currentUser = JSON.parse(saved);
            showPage();
        }
    </script>
</body>
</html>
