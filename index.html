<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOCALITY | Control Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@200;400;600;700;800&display=swap');
        body { font-family: 'Assistant', sans-serif; background: #f8fafc; color: #1e1b4b; min-height: 100vh; }
        .admin-sidebar { background: #1e1b4b; color: white; }
        .stat-card { background: white; border-radius: 2rem; padding: 1.5rem; box-shadow: 0 10px 30px -10px rgba(0,0,0,0.05); border: 1px solid #f1f5f9; }
        .table-row { transition: 0.2s; border-bottom: 1px solid #f1f5f9; }
        .table-row:hover { background: #fdfdfd; }
        .btn-approve { @apply bg-emerald-500 text-white px-4 py-2 rounded-xl font-bold text-xs hover:bg-emerald-600 transition; }
        .admin-page { display: none; }
        .admin-page.active { display: block; }
        .auth-container { background: white; border-radius: 3.5rem; box-shadow: 0 40px 100px -20px rgba(0,0,0,0.08); max-width: 480px; width: 100%; padding: 3rem; }
    </style>
</head>
<body class="antialiased">

    <nav class="fixed top-0 inset-x-0 h-20 bg-white/90 backdrop-blur-md z-[1000] px-8 flex justify-between items-center border-b border-slate-100">
        <div onclick="location.reload()" class="text-3xl font-black italic cursor-pointer">LOCALITY</div>
        <div class="flex items-center gap-4">
            <button onclick="showAdminLogin()" class="text-[10px] font-black uppercase text-slate-400 border border-slate-200 px-3 py-1 rounded-full">Admin Panel</button>
            <button onclick="openModal('modal-contact')" class="text-sm font-extrabold text-indigo-600">צור קשר</button>
        </div>
    </nav>

    <main id="app-content" class="pt-28 pb-10 px-4 flex items-center justify-center">
        <div id="auth-panel" class="auth-container">
            <div id="step-id" class="space-y-8 text-center">
                <h2 class="text-2xl font-black italic">כניסה לזירה</h2>
                <div class="grid grid-cols-1 gap-3">
                    <button onclick="loginSocial('google')" class="flex items-center justify-center gap-3 py-3 border rounded-2xl font-bold text-xs hover:bg-slate-50 transition"><img src="https://www.google.com/favicon.ico" class="w-4 h-4"> Google</button>
                </div>
                <input id="login-input" type="text" placeholder="הקש נייד או מייל" oninput="validateInput(this.value)" class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl text-center font-bold text-xl outline-none focus:border-indigo-600 transition">
                <button id="btn-submit" disabled onclick="handleIdentify()" class="w-full py-5 rounded-2xl font-black text-xl bg-slate-100 text-slate-300 cursor-not-allowed transition-all">כניסה</button>
            </div>
            
            <div id="step-role" class="hidden space-y-8 text-center">
                <div class="bg-indigo-50 p-6 rounded-[2rem]">
                    <h3 class="text-xl font-black text-indigo-900 italic">שלום, אנחנו לא מכירים!</h3>
                </div>
                <div class="grid grid-cols-3 gap-3">
                    <div onclick="startRegister('לקוח')" class="p-4 bg-slate-50 rounded-3xl cursor-pointer hover:bg-white border-2 border-transparent hover:border-indigo-600 transition">🛒<br><span class="text-[10px] font-black uppercase">לקוח</span></div>
                    <div onclick="startRegister('ספק')" class="p-4 bg-slate-50 rounded-3xl cursor-pointer hover:bg-white border-2 border-transparent hover:border-indigo-600 transition">🏭<br><span class="text-[10px] font-black uppercase">ספק</span></div>
                    <div onclick="startRegister('חנות')" class="p-4 bg-slate-50 rounded-3xl cursor-pointer hover:bg-white border-2 border-transparent hover:border-indigo-600 transition">📍<br><span class="text-[10px] font-black uppercase">חנות</span></div>
                </div>
            </div>

            <div id="step-form" class="hidden space-y-4">
                <div id="dynamic-fields" class="grid grid-cols-1 gap-3"></div>
                <button onclick="submitFinal()" class="w-full bg-indigo-950 text-white py-4 rounded-2xl font-black shadow-xl">סיום רישום</button>
            </div>
        </div>
    </main>

    <div id="admin-panel" class="admin-page fixed inset-0 z-[2000] bg-slate-50 pt-24 overflow-y-auto px-8">
        <div class="max-w-6xl mx-auto space-y-10">
            <div class="flex justify-between items-end">
                <div>
                    <h1 class="text-5xl font-black text-indigo-950 italic">Control Center</h1>
                    <p class="text-slate-400 font-bold mt-2 uppercase tracking-widest text-xs">ניהול מערכת LOCALITY</p>
                </div>
                <button onclick="location.reload()" class="bg-white px-6 py-2 rounded-full shadow-sm text-xs font-black">התנתק מהניהול</button>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
                <div class="stat-card"><p class="text-[10px] font-black opacity-40">סה"כ משתמשים</p><p id="count-total" class="text-3xl font-black">0</p></div>
                <div class="stat-card border-orange-100"><p class="text-[10px] font-black text-orange-400">ממתינים לאישור</p><p id="count-pending" class="text-3xl font-black">0</p></div>
                <div class="stat-card"><p class="text-[10px] font-black opacity-40">ספקים פעילים</p><p id="count-vendors" class="text-3xl font-black">0</p></div>
                <div class="stat-card"><p class="text-[10px] font-black opacity-40">חנויות (Hubs)</p><p id="count-hubs" class="text-3xl font-black">0</p></div>
            </div>

            <div class="bg-white rounded-[3rem] p-8 shadow-xl border border-slate-100">
                <h2 class="text-xl font-black mb-6 border-b pb-4 italic">בקשות אישור חדשות</h2>
                <div class="overflow-x-auto">
                    <table class="w-full text-right">
                        <thead>
                            <tr class="text-slate-400 text-xs font-black uppercase tracking-widest">
                                <th class="pb-4">שם / עסק</th>
                                <th class="pb-4">תפקיד</th>
                                <th class="pb-4">פרטי קשר</th>
                                <th class="pb-4">פעולות</th>
                            </tr>
                        </thead>
                        <tbody id="approval-list">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- FIREBASE CONFIG (YOURS) ---
        const firebaseConfig = {
            apiKey: "AIzaSyCKqnuCr2ejDPU74KDzw9LZQAk830KF78Q",
            authDomain: "locality-2a821.firebaseapp.com",
            projectId: "locality-2a821",
            storageBucket: "locality-2a821.firebasestorage.app",
            messagingSenderId: "1030549590558",
            appId: "1:1030549590558:web:b7876d795de5aa60a1140f"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // 1. ADMIN LOGIC
        function showAdminLogin() {
            const pass = prompt("הכנס קוד גישה למנהל המערכת:");
            if(pass === "1234") { // כאן תוכל לשנות את הקוד בעתיד
                document.getElementById('app-content').style.display = 'none';
                document.getElementById('admin-panel').classList.add('active');
                loadAdminData();
            } else {
                alert("גישה חסומה.");
            }
        }

        async function loadAdminData() {
            const snap = await db.collection("users").get();
            const users = snap.docs.map(doc => ({id: doc.id, ...doc.data()}));
            
            // Stats
            document.getElementById('count-total').innerText = users.length;
            document.getElementById('count-pending').innerText = users.filter(u => u.status === 'pending').length;
            document.getElementById('count-vendors').innerText = users.filter(u => u.role === 'ספק' && u.status === 'approved').length;
            document.getElementById('count-hubs').innerText = users.filter(u => u.role === 'חנות' && u.status === 'approved').length;

            // Approval List
            const list = document.getElementById('approval-list');
            list.innerHTML = "";
            users.filter(u => u.status === 'pending').forEach(u => {
                list.innerHTML += `
                    <tr class="table-row">
                        <td class="py-4 font-bold text-sm">${u.name} <br> <span class="text-[10px] opacity-50">${u.bizName || ''}</span></td>
                        <td class="py-4"><span class="px-3 py-1 bg-slate-100 rounded-full text-[10px] font-black">${u.role}</span></td>
                        <td class="py-4 text-xs font-medium text-slate-500">${u.idKey}</td>
                        <td class="py-4">
                            <button onclick="approveUser('${u.id}')" class="btn-approve">אשר עכשיו</button>
                        </td>
                    </tr>
                `;
            });
        }

        async function approveUser(docId) {
            await db.collection("users").doc(docId).update({ status: 'approved' });
            alert("המשתמש אושר בהצלחה!");
            loadAdminData();
        }

        // 2. AUTH LOGIC (FROM PREVIOUS VERSIONS)
        let currentId = '';
        let role = '';

        function validateInput(val) {
            const btn = document.getElementById('btn-submit');
            if(/^\d{10}$/.test(val) || /\S+@\S+\.\S+/.test(val)) {
                btn.disabled = false;
                btn.className = "w-full py-5 rounded-2xl font-black text-xl bg-indigo-950 text-white shadow-xl cursor-pointer";
            } else {
                btn.disabled = true;
                btn.className = "w-full py-5 rounded-2xl font-black text-xl bg-slate-100 text-slate-300 cursor-not-allowed";
            }
        }

        function handleIdentify() {
            currentId = document.getElementById('login-input').value;
            document.getElementById('step-id').classList.add('hidden');
            document.getElementById('step-role').classList.remove('hidden');
        }

        function startRegister(r) {
            role = r;
            document.getElementById('step-role').classList.add('hidden');
            document.getElementById('step-form').classList.remove('hidden');
            const cont = document.getElementById('dynamic-fields');
            let fields = `<input id="reg-name" placeholder="שם מלא (חובה)" class="w-full p-4 bg-slate-50 rounded-2xl font-bold">`;
            if(r === 'ספק') fields += `<input id="reg-biz" placeholder="שם העסק" class="w-full p-4 bg-slate-50 rounded-2xl font-bold">`;
            if(r === 'לקוח') fields += `<input id="reg-addr" placeholder="כתובת מגורים" class="w-full p-4 bg-slate-50 rounded-2xl font-bold">`;
            cont.innerHTML = fields;
        }

        async function submitFinal() {
            const data = { 
                idKey: currentId, 
                name: document.getElementById('reg-name').value, 
                role: role, 
                status: role === 'לקוח' ? 'approved' : 'pending',
                bizName: document.getElementById('reg-biz')?.value || ''
            };
            await db.collection("users").add(data);
            alert("נרשמת! הבקשה הועברה לאישור מנהל.");
            location.reload();
        }

        function openModal(id) { alert("פתיחת טופס צור קשר..."); }
    </script>
</body>
</html>
