<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Locality - The Direct Marketing System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700;800&display=swap');
        body { font-family: 'Assistant', sans-serif; background: #f8fafc; color: #1e293b; }
        .page { display: none; min-height: 100vh; }
        .page.active { display: flex; flex-direction: column; }
        .form-card { background: white; padding: 2.5rem; border-radius: 3rem; box-shadow: 0 20px 50px rgba(0,0,0,0.05); border: 1px solid #f1f5f9; }
        input, select, textarea { width: 100%; padding: 14px; border: 1px solid #e2e8f0; border-radius: 16px; outline: none; transition: 0.3s; font-size: 15px; }
        input:focus { border-color: #4f46e5; box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1); }
        label { display: block; font-size: 12px; font-weight: 800; color: #64748b; margin-bottom: 6px; margin-right: 4px; }
        .admin-sidebar { width: 280px; background: #0f172a; color: white; padding: 2rem; }
        .nav-link { padding: 14px; border-radius: 14px; cursor: pointer; margin-bottom: 8px; transition: 0.2s; font-size: 14px; display: flex; align-items: center; gap: 10px; }
        .nav-link:hover { background: #1e293b; }
        .nav-link.active { background: #4f46e5; font-weight: 700; }
        .btn-primary { background: #4f46e5; color: white; padding: 16px; border-radius: 18px; font-weight: 700; width: 100%; transition: 0.3s; }
        .btn-primary:hover { background: #4338ca; transform: translateY(-2px); }
    </style>
</head>
<body>

    <div id="page-auth" class="page active items-center justify-center p-6">
        <div class="max-w-md w-full">
            <div class="text-center mb-10">
                <h1 class="text-5xl font-black text-indigo-900 italic tracking-tighter">LOCALITY</h1>
                <p class="text-slate-400 mt-2 font-medium">ניהול שיווק ישיר מהיצרן לצרכן</p>
            </div>

            <div id="auth-step-1" class="form-card">
                <label>הכנס מספר נייד</label>
                <input id="auth-phone" type="tel" placeholder="05X-XXXXXXX" class="text-center text-2xl font-bold tracking-widest mb-6">
                <button onclick="handlePhoneSubmit()" class="btn-primary">המשך לזירה</button>
                <button onclick="showAdminLogin()" class="mt-4 w-full text-xs text-slate-400 font-bold hover:text-indigo-600 transition">כניסת אדמין</button>
            </div>

            <div id="auth-login" class="hidden form-card">
                <p id="login-greeting" class="text-center font-bold text-indigo-900 mb-6"></p>
                <label>סיסמה</label>
                <input id="login-pass" type="password" class="mb-6 text-center text-xl">
                <button onclick="executeLogin()" class="btn-primary">התחברות</button>
            </div>

            <div id="auth-register" class="hidden form-card">
                <div class="bg-indigo-50 p-4 rounded-2xl mb-8 text-center border border-indigo-100">
                    <p class="text-indigo-900 font-bold">שלום, אנחנו לא מכירים!</p>
                    <p class="text-indigo-700 text-xs italic">מעבירים אותך לרישום מהיר במערכת</p>
                </div>

                <div class="space-y-4">
                    <label>אני רוצה להירשם כ...</label>
                    <select id="reg-role" onchange="toggleRoleFields()" class="font-bold text-indigo-600">
                        <option value="customer">לקוח קצה</option>
                        <option value="vendor">ספק / יצרן</option>
                        <option value="hub">נקודת איסוף (Hub)</option>
                    </select>

                    <div class="grid grid-cols-1 gap-4">
                        <div><label>שם מלא</label><input id="reg-name" type="text"></div>
                        <div><label>אימייל</label><input id="reg-email" type="email"></div>
                        
                        <div id="v-fields" class="hidden space-y-4 border-t pt-4">
                            <div><label>שם העסק</label><input id="v-biz"></div>
                            <div><label>כתובת</label><input id="v-addr"></div>
                            <div><label>סוג הפצה</label>
                                <select id="v-dist"><option value="pickup">איסוף ממני</option><option value="delivery">מביא לנקודות</option></select>
                            </div>
                            <div><label>אזורי הגעה</label><select id="v-zones-select" multiple class="h-24"></select></div>
                            <div class="p-4 bg-slate-50 rounded-2xl">
                                <p class="text-[10px] font-black mb-2 opacity-50">פרטי בנק (רשות)</p>
                                <input id="v-bank" placeholder="בנק, סניף, ח-ן" class="text-xs mb-2">
                            </div>
                        </div>

                        <div id="h-fields" class="hidden space-y-4 border-t pt-4">
                            <div><label>שם הנקודה</label><input id="h-point"></div>
                            <div><label>כתובת (מאומת גוגל)</label><input id="h-addr"></div>
                            <div><label>אזור שייכות</label><select id="h-zones-select"></select></div>
                            <div><label>לוגיסטיקה</label>
                                <select id="h-logic"><option>יכול לאסוף מספק</option><option>רק הגעה מספק</option></select>
                            </div>
                        </div>
                    </div>

                    <div class="pt-4 border-t">
                        <label>בחר סיסמה</label>
                        <input id="reg-pass" type="password" class="mb-4">
                        <div class="flex items-center gap-2">
                            <input type="checkbox" id="reg-terms" class="w-4 h-4 accent-indigo-600">
                            <span class="text-[10px] text-slate-500 font-bold uppercase">קראתי ואישרתי את התקנון</span>
                        </div>
                    </div>
                    <button onclick="handleRegister()" class="btn-primary mt-4">סיום רישום</button>
                </div>
            </div>
        </div>
    </div>

    <div id="page-admin" class="page flex-row bg-slate-50">
        <aside class="admin-sidebar shadow-2xl">
            <div class="text-2xl font-black italic mb-10 text-indigo-400">ADMIN HQ</div>
            <nav class="space-y-2">
                <div onclick="showAdminTab('users')" id="tab-users" class="nav-link active"><span>👥</span> ניהול משתמשים</div>
                <div onclick="showAdminTab('zones')" id="tab-zones" class="nav-link"><span>📍</span> אזורי חלוקה</div>
                <div onclick="showAdminTab('settings')" id="tab-settings" class="nav-link"><span>⚙️</span> הגדרות עמלות</div>
            </nav>
            <button onclick="location.reload()" class="mt-20 text-slate-500 text-xs hover:text-white transition font-bold uppercase tracking-widest">התנתק</button>
        </aside>

        <main class="flex-1 p-12 overflow-y-auto">
            <div id="admin-users" class="admin-section">
                <h2 class="text-3xl font-black mb-8">אישור וניהול משתמשים</h2>
                <div class="bg-white rounded-[2rem] border overflow-hidden shadow-sm">
                    <table class="w-full text-right">
                        <thead class="bg-slate-50 border-b">
                            <tr>
                                <th class="p-5 text-xs font-black uppercase text-slate-400">שם</th>
                                <th class="p-5 text-xs font-black uppercase text-slate-400">תפקיד</th>
                                <th class="p-5 text-xs font-black uppercase text-slate-400">סטטוס</th>
                                <th class="p-5 text-xs font-black uppercase text-slate-400 text-left">פעולות</th>
                            </tr>
                        </thead>
                        <tbody id="user-list"></tbody>
                    </table>
                </div>
            </div>

            <div id="admin-zones" class="admin-section hidden">
                <h2 class="text-3xl font-black mb-8">ניהול אזורי חלוקה</h2>
                <div class="form-card max-w-lg mb-8">
                    <label>הוסף אזור חדש</label>
                    <div class="flex gap-2">
                        <input id="new-zone-input" placeholder="למשל: עמק יזרעאל">
                        <button onclick="addZone()" class="bg-indigo-600 text-white px-6 rounded-xl font-bold">הוסף</button>
                    </div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4" id="zone-display"></div>
            </div>

            <div id="admin-settings" class="admin-section hidden">
                <h2 class="text-3xl font-black mb-8">הגדרות מערכת</h2>
                <div class="form-card max-w-md">
                    <div class="space-y-6">
                        <div><label>עמלת מערכת (%)</label><input type="number" value="10"></div>
                        <div><label>עמלת נקודת איסוף (%)</label><input type="number" value="5"></div>
                        <button class="btn-primary">שמור הגדרות</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // DB Core
        let db = JSON.parse(localStorage.getItem('locality_db_v18')) || [];
        let zones = JSON.parse(localStorage.getItem('locality_zones')) || ["מרכז", "צפון", "דרום"];
        let currentUser = null;

        // AUTH LOGIC
        function handlePhoneSubmit() {
            const phone = document.getElementById('auth-phone').value;
            if (phone.length < 9) return alert("מספר לא תקין");
            
            currentUser = db.find(u => u.phone === phone);
            document.getElementById('auth-step-1').classList.add('hidden');
            
            if (currentUser) {
                document.getElementById('auth-login').classList.remove('hidden');
                document.getElementById('login-greeting').innerText = `שלום ${currentUser.name}, הכנס סיסמה:`;
            } else {
                document.getElementById('auth-register').classList.remove('hidden');
                populateZoneSelects();
            }
        }

        function toggleRoleFields() {
            const role = document.getElementById('reg-role').value;
            document.getElementById('v-fields').classList.toggle('hidden', role !== 'vendor');
            document.getElementById('h-fields').classList.toggle('hidden', role !== 'hub');
        }

        function populateZoneSelects() {
            const vSelect = document.getElementById('v-zones-select');
            const hSelect = document.getElementById('h-zones-select');
            const options = zones.map(z => `<option value="${z}">${z}</option>`).join('');
            vSelect.innerHTML = options;
            hSelect.innerHTML = `<option value="">בחר אזור...</option>` + options;
        }

        function handleRegister() {
            const phone = document.getElementById('auth-phone').value;
            const name = document.getElementById('reg-name').value;
            const email = document.getElementById('reg-email').value;
            const role = document.getElementById('reg-role').value;
            const pass = document.getElementById('reg-pass').value;
            const terms = document.getElementById('reg-terms').checked;

            if (!name || !email.includes('@') || !pass || !terms) return alert("אנא מלא את כל שדות החובה ואשר תקנון");

            const newUser = {
                phone, name, email, role, pass,
                id: Date.now(),
                status: (role === 'customer' || phone === '0500000000') ? 'approved' : 'pending'
            };

            db.push(newUser);
            saveDB();
            alert("הרישום בוצע! " + (newUser.status === 'pending' ? "ממתין לאישור אדמין." : "ברוך הבא."));
            location.reload();
        }

        function executeLogin() {
            const pass = document.getElementById('login-pass').value;
            if (currentUser.pass === pass) {
                if (currentUser.phone === '0500000000') showAdmin();
                else if (currentUser.status === 'pending') alert("החשבון ממתין לאישור אדמין");
                else alert("נכנסת בהצלחה כ-" + currentUser.role);
            } else {
                alert("סיסמה שגויה");
            }
        }

        function showAdminLogin() {
            document.getElementById('auth-phone').value = "0500000000";
            handlePhoneSubmit();
        }

        // ADMIN LOGIC
        function showAdmin() {
            document.getElementById('page-auth').classList.remove('active');
            document.getElementById('page-admin').classList.add('active');
            renderUsers();
            renderZones();
        }

        function showAdminTab(tab) {
            document.querySelectorAll('.admin-section').forEach(s => s.classList.add('hidden'));
            document.getElementById('admin-' + tab).classList.remove('hidden');
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById('tab-' + tab).classList.add('active');
        }

        function renderUsers() {
            const list = document.getElementById('user-list');
            list.innerHTML = db.map(u => `
                <tr class="border-b hover:bg-slate-50 transition">
                    <td class="p-5 font-bold text-indigo-900">${u.name}</td>
                    <td class="p-5 text-xs font-black uppercase text-slate-400">${u.role}</td>
                    <td class="p-5">
                        <span class="px-3 py-1 rounded-full text-[10px] font-bold ${u.status === 'approved' ? 'bg-emerald-100 text-emerald-700' : 'bg-orange-100 text-orange-700'}">
                            ${u.status.toUpperCase()}
                        </span>
                    </td>
                    <td class="p-5 text-left">
                        ${u.status === 'pending' ? `<button onclick="approveUser(${u.id})" class="text-indigo-600 font-bold ml-4">אשר</button>` : ''}
                        <button onclick="deleteUser(${u.id})" class="text-red-400 hover:text-red-600 font-bold">מחק</button>
                    </td>
                </tr>
            `).join('');
        }

        function renderZones() {
            const container = document.getElementById('zone-display');
            container.innerHTML = zones.map((z, i) => `
                <div class="bg-white p-4 rounded-2xl border flex justify-between items-center shadow-sm">
                    <span class="font-bold">${z}</span>
                    <button onclick="deleteZone(${i})" class="text-red-300 hover:text-red-600 font-black">&times;</button>
                </div>
            `).join('');
            localStorage.setItem('locality_zones', JSON.stringify(zones));
        }

        function addZone() {
            const input = document.getElementById('new-zone-input');
            if (input.value) {
                zones.push(input.value);
                input.value = '';
                renderZones();
            }
        }

        function deleteZone(index) {
            zones.splice(index, 1);
            renderZones();
        }

        function approveUser(id) {
            db.find(u => u.id === id).status = 'approved';
            saveDB();
            renderUsers();
        }

        function deleteUser(id) {
            if(confirm("למחוק משתמש?")) {
                db = db.filter(u => u.id !== id);
                saveDB();
                renderUsers();
            }
        }

        function saveDB() { localStorage.setItem('locality_db_v18', JSON.stringify(db)); }
    </script>
</body>
</html>
